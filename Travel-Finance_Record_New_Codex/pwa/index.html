<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f766e" />
  <meta name="description" content="Travel and finance records with a Google Sheets backend" />
  <title>Travel Finance Record</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="css/app.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">Travel Finance Record</p>
        <h1>Lean PWA Rebuild</h1>
      </div>
      <button id="refresh-btn" class="ghost-btn" type="button">Refresh</button>
    </header>

    <section class="hero-card">
      <div>
        <p class="hero-label">Google Sheets backend</p>
        <h2>One app for travel, documents, and finance</h2>
        <p class="hero-copy">This rebuild starts with a simpler boot flow, a single app shell, and a lightweight Apps Script API.</p>
      </div>
      <div class="status-stack">
        <div class="status-pill" id="online-pill">Checking network</div>
        <div class="status-pill muted" id="sync-pill">Idle</div>
      </div>
    </section>

    <nav class="tabbar" id="tabbar">
      <button data-route="dashboard" class="tab is-active" type="button">Dashboard</button>
      <button data-route="people" class="tab" type="button">People</button>
      <button data-route="trips" class="tab" type="button">Trips</button>
      <button data-route="documents" class="tab" type="button">Documents</button>
      <button data-route="finance" class="tab" type="button">Finance</button>
      <button data-route="settings" class="tab" type="button">Settings</button>
    </nav>

    <main id="screen" class="screen"></main>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
