name: Build Personal Vault (Android)

on:
  workflow_dispatch: # Manual trigger rules apply
  push:
    branches:
      - main
    paths:
      - 'Travel-Vault_Android/Personal_vault/**' # Isolated trigger path

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Install Dependencies & Sync with Capacitor
        working-directory: Travel-Vault_Android/Personal_vault
        run: |
          npm install
          chmod +x node_modules/.bin/cap
          node_modules/.bin/cap sync android

      - name: Build Android Release APK (Gradle)
        working-directory: Travel-Vault_Android/Personal_vault/android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Align and Sign release APK
        working-directory: Travel-Vault_Android/Personal_vault/android/app/build/outputs/apk/release
        env:
          KEYSTORE_B64: ${{ secrets.SIGNING_KEY_STORE_BASE64 }}
          KEYSTORE_PASS: ${{ secrets.SIGNING_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          KEY_PASS: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: |
          echo "$KEYSTORE_B64" | base64 --decode > temp-keystore.jks
          BUILD_TOOLS_DIR=$(ls -d $ANDROID_SDK_ROOT/build-tools/* | tail -1)
          $BUILD_TOOLS_DIR/zipalign -v -p 4 app-release-unsigned.apk vault-app-release-signed.apk
          $BUILD_TOOLS_DIR/apksigner sign --ks temp-keystore.jks --ks-key-alias "$KEY_ALIAS" --ks-pass "pass:$KEYSTORE_PASS" --key-pass "pass:$KEY_PASS" vault-app-release-signed.apk
          rm temp-keystore.jks

      - name: Upload Signed APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: vault-app-release-signed-apk
          path: Travel-Vault_Android/Personal_vault/android/app/build/outputs/apk/release/vault-app-release-signed.apk
          retention-days: 7
