name: Build Travel App (Android)

on:
  workflow_dispatch: # Allows manual trigger from the GitHub UI to save minutes!
  push:
    branches:
      - main
    paths:
      - 'Travel-Vault_Android/Travel_app/**' # Only trigger if Travel App files change

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-android:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Install Dependencies & Bundle Shared Assets
        working-directory: Travel-Vault_Android/Travel_app
        run: |
          npm install
          # Capacitor only bundles webDir (src/). Copy shared/ in so imports resolve.
          rm -rf src/shared
          cp -r shared src/shared
          
          # Verify shared folder is not empty
          if [ ! -f src/shared/auth.js ]; then
            echo "Critical Error: src/shared/auth.js not found after copy!"
            exit 1
          fi

          # ── NATIVE STABILITY PIVOT (v5.3.0) ──
          # Strip 'export' and 'import' from all shared and internal JS files
          # This converts them from ES Modules to Standard Scripts
          find src -type f -name "*.js" -exec sed -i 's/^export //g' {} +
          find src -type f -name "*.js" -exec sed -i 's/^import.*from.*//g' {} +
          find src -type f -name "*.js" -exec sed -i "s|import(.*)||g" {} +
          
          # Also fix any remaining hardcoded '../shared/' paths in non-JS files (like HTML/CSS)
          find src -type f \( -name "*.html" -o -name "*.css" \) -exec sed -i "s|['\"]../shared/|'./shared/|g" {} +
          find src -type f \( -name "*.html" -o -name "*.css" \) -exec sed -i "s|/shared/|./shared/|g" {} +

      - name: Generate App Icons
        working-directory: Travel-Vault_Android/Travel_app
        run: |
          npm install -D @capacitor/assets
          npx @capacitor/assets generate --iconBackgroundColor '#3730A3' --iconBackgroundColorDark '#3730A3' --android

      - name: Sync Capacitor
        working-directory: Travel-Vault_Android/Travel_app
        run: |
          chmod +x node_modules/.bin/cap
          node_modules/.bin/cap sync android

      - name: Build Android Release APK (Gradle)
        working-directory: Travel-Vault_Android/Travel_app/android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Align and Sign release APK
        working-directory: Travel-Vault_Android/Travel_app/android/app/build/outputs/apk/release
        env:
          KEYSTORE_B64: ${{ secrets.SIGNING_KEY_STORE_BASE64 }}
          KEYSTORE_PASS: ${{ secrets.SIGNING_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          KEY_PASS: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: |
          echo "$KEYSTORE_B64" | base64 --decode > temp-keystore.jks
          BUILD_TOOLS_DIR=$(ls -d $ANDROID_SDK_ROOT/build-tools/* | tail -1)
          $BUILD_TOOLS_DIR/zipalign -v -p 4 app-release-unsigned.apk travel-app-release-signed.apk
          $BUILD_TOOLS_DIR/apksigner sign --ks temp-keystore.jks --ks-key-alias "$KEY_ALIAS" --ks-pass "pass:$KEYSTORE_PASS" --key-pass "pass:$KEY_PASS" travel-app-release-signed.apk
          rm temp-keystore.jks

      - name: Upload Signed APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: travel-app-release-signed-apk
          path: Travel-Vault_Android/Travel_app/android/app/build/outputs/apk/release/travel-app-release-signed.apk
          retention-days: 3
