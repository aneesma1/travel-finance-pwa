name: Build Travel App (Android)

on:
  workflow_dispatch: # Allows manual trigger from the GitHub UI to save minutes!
  push:
    branches:
      - master
    paths:
      - 'Travel-Vault_Android/Travel_app/**'
      - '.github/workflows/build-travel.yml'
      # NOTE: Travel-Vault_PWA/** is intentionally excluded.
      # APK and HTML are fully independent builds. PWA changes never trigger APK builds.

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-android:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Install Dependencies & Bundle Shared Assets
        working-directory: Travel-Vault_Android/Travel_app
        run: |
          npm install
          # Capacitor only bundles webDir (src/).

          # Verify shared folder is not empty
          if [ ! -f src/shared/sync-manager.js ]; then
            echo "Critical Error: src/shared/sync-manager.js not found after copy!"
            exit 1
          fi

          # ── Bundle XLSX locally so the import tool works offline / without CDN ──
          mkdir -p src/js/lib
          cp node_modules/xlsx/dist/xlsx.full.min.js src/js/lib/xlsx.full.min.js
          echo "XLSX bundled: $(wc -c < src/js/lib/xlsx.full.min.js) bytes"

          # ── NATIVE STABILITY PIVOT (v5.4.0) ──
          # No longer stripping imports/exports or modifying shared paths.
          # Capacitor natively supports ES modules.

      - name: Inject Version Information
        working-directory: Travel-Vault_Android/Travel_app
        run: |
          # 1. Read Version & Time
          export APP_VER=$(cat VERSION)
          export BUILD_TIME=$(date +"%Y-%m-%d %H:%M")
          echo "APP_VER=$APP_VER" >> $GITHUB_ENV
          echo "Building Travel Hub v$APP_VER ($BUILD_TIME)"

          # 2. Inject into index.html
          sed -i "s|window.APP_VERSION = '.*'|window.APP_VERSION = '$APP_VER'|g" src/index.html
          sed -i "s|window.BUILD_TIME = '.*'|window.BUILD_TIME = '$BUILD_TIME'|g" src/index.html
        shell: bash
          
      - name: Generate App Icons
        working-directory: Travel-Vault_Android/Travel_app
        run: |
          npm install -D @capacitor/assets
          npx @capacitor/assets generate --iconBackgroundColor '#3730A3' --iconBackgroundColorDark '#3730A3' --android

      - name: Sync Capacitor
        working-directory: Travel-Vault_Android/Travel_app
        run: |
          chmod +x node_modules/.bin/cap
          node_modules/.bin/cap sync android

      - name: Build Android Release APK (Gradle)
        working-directory: Travel-Vault_Android/Travel_app/android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Align and Sign release APK
        working-directory: Travel-Vault_Android/Travel_app/android/app/build/outputs/apk/release
        env:
          KEYSTORE_B64: ${{ secrets.SIGNING_KEY_STORE_BASE64 }}
          KEYSTORE_PASS: ${{ secrets.SIGNING_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          KEY_PASS: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: |
          APP_VER=${{ env.APP_VER }}
          RUN_NUM=${{ github.run_number }}
          echo "$KEYSTORE_B64" | base64 --decode > temp-keystore.jks
          BUILD_TOOLS_DIR=$(ls -d $ANDROID_SDK_ROOT/build-tools/* | tail -1)
          $BUILD_TOOLS_DIR/zipalign -v -p 4 app-release-unsigned.apk "TravelHub_v${APP_VER}_b${RUN_NUM}.apk"
          $BUILD_TOOLS_DIR/apksigner sign --ks temp-keystore.jks --ks-key-alias "$KEY_ALIAS" --ks-pass "pass:$KEYSTORE_PASS" --key-pass "pass:$KEY_PASS" "TravelHub_v${APP_VER}_b${RUN_NUM}.apk"
          rm temp-keystore.jks

      - name: Upload Signed APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: travel-app-release-signed-apk
          path: Travel-Vault_Android/Travel_app/android/app/build/outputs/apk/release/TravelHub_v*.apk
          retention-days: 3
