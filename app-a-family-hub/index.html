<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="referrer" content="no-referrer" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' cdnjs.cloudflare.com fonts.googleapis.com; connect-src 'self' https://*.googleapis.com https://accounts.google.com https://nominatim.openstreetmap.org https://www.openstreetmap.org; font-src 'self' fonts.gstatic.com data:; frame-src https://www.openstreetmap.org; img-src 'self' data: https://*.openstreetmap.org https://*.googleapis.com; style-src 'self' 'unsafe-inline' fonts.googleapis.com;" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#3730A3" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Family Hub" />
  <meta name="description" content="Family travel tracker and document expiry manager" />

  <title>Family Hub</title>

  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icons/icon-192.png" type="image/png">
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="css/app.css" />
</head>
<body>

<div id="app">

  <!-- ── Offline banner ────────────────────────────────────────────── -->
  <div id="offline-banner" class="offline-banner hidden" role="status">
    <span>📡</span>
    <span>Offline — changes will sync when reconnected</span>
  </div>

  <!-- ── Main screen container ─────────────────────────────────────── -->
  <main id="screen" role="main" aria-live="polite">
    <!-- Screens rendered here by router.js -->
    <div class="login-screen" id="initial-loader">
      <div class="spinner"></div>
    </div>
  </main>

  <!-- ── Sync status indicator ─────────────────────────────────────── -->
  <!-- Modal overlay (used by settings, people, etc.) -->
  <div id="member-modal" class="modal-overlay hidden" style="
    position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:500;
    display:flex;align-items:flex-end;justify-content:center;
  "></div>

  <div id="sync-indicator" class="hidden" style="
    position:fixed;top:0;left:0;right:0;z-index:500;
    display:flex;align-items:center;justify-content:center;
    gap:6px;padding:6px 16px;font-size:12px;font-weight:500;
    background:var(--surface);border-bottom:1px solid var(--border);
    transition:all 0.2s;cursor:pointer;
  "></div>

  <!-- ── Bottom navigation (hidden until authenticated) ────────────── -->
  <nav class="bottom-nav hidden" id="bottom-nav" role="navigation" aria-label="Main navigation">
    <button class="nav-item active" data-screen="dashboard" aria-label="Dashboard">
      <span class="nav-icon">🏠</span>
      <span>Home</span>
    </button>
    <button class="nav-item" data-screen="travel-log" aria-label="Travel Log">
      <span class="nav-icon">✈️</span>
      <span>Travel</span>
    </button>
    <button class="nav-item" data-screen="documents" aria-label="Documents">
      <span class="nav-icon">🪪</span>
      <span>Docs</span>
    </button>
    <button class="nav-item" data-screen="people" aria-label="People">
      <span class="nav-icon">👥</span>
      <span>People</span>
    </button>
    <button class="nav-item" data-screen="settings" aria-label="Settings">
      <span class="nav-icon">⚙️</span>
      <span>Settings</span>
    </button>
  </nav>

</div><!-- #app -->

<!-- ── App bootstrap ──────────────────────────────────────────────── -->
<script type="module">
  import { handleOAuthCallback, isAuthenticated, startOAuthFlow, getUser, clearAuth } from '../shared/auth.js';
  import { initDriveFolders, initDataFile, initMirrorFile, readData } from '../shared/drive.js';
  import { setCachedTravelData, getCachedTravelData, openDB } from '../shared/db.js';
  import { navigate, initNav } from './js/router.js';
  import { isOnline, onNetworkChange, showToast } from '../shared/utils.js';
  import { CLIENT_ID, REDIRECT_URI } from './js/auth-config.js';
  import { resolveRole, setCurrentRole, applyRoleRestrictions } from './js/roles.js';
  import { registerSession, logActivity, startHeartbeat, getUnseenHighRiskEvents, checkRevocation } from '../shared/security-log.js';
  import { runExpiryCheck } from './js/expiry-checker.js';
  import { initInstallPrompt, showIOSInstallHint } from '../shared/pwa-install.js';
  import { initSyncManager, runBootIntegrityCheck, processDriveQueue, watchConnectivity as watchSync } from '../shared/sync-manager.js';
  import { watchConnectivity } from '../shared/sync-queue.js';

  // ── Service Worker registration ────────────────────────────────────
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').then(reg => {
      // Request periodic background sync for mirror writes
      if ('periodicSync' in reg) {
        reg.periodicSync.register('drive-mirror-sync', { minInterval: 30 * 60 * 1000 })
          .catch(() => {}); // Permission may not be granted
      }
    }).catch(() => {});

    // Listen for mirror sync requests from SW
    navigator.serviceWorker.addEventListener('message', (e) => {
      if (e.data?.type === 'MIRROR_SYNC_REQUESTED') {
        performMirrorSync();
      }
    });
  }

  // ── Offline banner ─────────────────────────────────────────────────
  const banner = document.getElementById('offline-banner');
  function updateOfflineBanner(online) {
    banner.classList.toggle('hidden', online);
  }
  updateOfflineBanner(isOnline());
  onNetworkChange((online) => {
    updateOfflineBanner(online);
    if (online) {
      showToast('Back online — syncing...', 'success');
      syncFromQueue();
    }
  });

  // ── Auth + boot sequence ───────────────────────────────────────────
  async function boot() {
    try {
      // 1. Handle OAuth callback — implicit flow returns token in URL hash
      const urlHash    = window.location.hash;
      const urlSearch  = window.location.search;
      const isCallback = urlHash.includes('access_token') || 
                         urlSearch.includes('error') ||
                         urlHash.includes('error');

      console.log('Boot: hash:', urlHash.slice(0,60));
      console.log('Boot: isCallback:', isCallback);

      if (isCallback) {
        console.log('Boot: handling OAuth callback...');
        await handleOAuthCallback(CLIENT_ID, REDIRECT_URI);
        console.log('Boot: callback done, isAuthenticated:', isAuthenticated());
      }
      if (!isAuthenticated()) {
        showLogin();
        return;
      }

      // 3. Open IndexedDB
      await openDB();

      // 4. Show cached data immediately (dashboard-first)
      const cached = await getCachedTravelData();
      if (cached) {
        window._travelData = cached;
        showApp(cached);
        // Run integrity checks in background after showing cached data
        runBootIntegrityCheck('travel').then(issues => {
          issues.forEach(issue => {
            if (issue.type === 'interrupted_write') {
              showToast('⚠️ Last save was interrupted. Check your data.', 'warning', 5000);
            } else if (issue.type === 'suspicious_drop') {
              showToast('⚠️ ' + issue.message, 'warning', 6000);
            }
          });
        }).catch(() => {});
      } else {
        showLoading();
      }

      // 5. Init Drive in background (non-blocking for UX)
      if (isOnline()) {
        try {
          await initDriveFolders();
          await initDataFile('travel');
          await initMirrorFile('travel');
          const { data } = await readData('travel');
          await setCachedTravelData(data);
          window._travelData = data;
          showApp(data);
        } catch (err) {
          if (err.message === 'Authentication required') {
            showLogin();
          } else if (cached) {
            showToast('Using cached data — Drive sync failed', 'warning');
          } else {
            showError(err.message);
          }
        }
      } else if (!cached) {
        showError('No cached data available offline. Please connect to the internet first.');
      }

    } catch (err) {
      console.error('Boot error:', err);
      console.error('Boot error message:', err.message);
      console.error('Boot error stack:', err.stack);
      showLogin();
    }
  }

  function showLogin() {
    const screen = document.getElementById('screen');
    screen.innerHTML = `
      <div class="login-screen fade-in">
        <div class="login-logo">✈️</div>
        <h1 class="login-title">Family Hub</h1>
        <p class="login-subtitle">Track your family's travel cycles<br>and document expiry dates</p>
        <button class="google-signin-btn" id="signin-btn">
          <svg width="20" height="20" viewBox="0 0 24 24">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v3.4.2 — 2026-03-22 — 2026-03-22 — 2026-03-22 — 2026-03-22 — 2026-03-22 — 2026-03-22 — 2026-03-22 — 2026-03-22 — 2026-03-22 — 2026-03-22 — 2026-03-21 — 2026-03-21 — 2026-03-21 — 2026-03-21 — 2026-03-21 1.37-1.04 2.53-2.21 3.31v3.4.2 — 2026-03-22 — 2026-03-22 — 2026-03-22 — 2026-03-22 — 2026-03-22 — 2026-03-22 — 2026-03-22 — 2026-03-22 — 2026-03-22 — 2026-03-22 — 2026-03-21 — 2026-03-21 — 2026-03-21 — 2026-03-21 — 2026-03-21 3.28-4.74 3.28-8.09z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v3.4.2 — 2026-03-22 — 2026-03-22 — 2026-03-22 — 2026-03-22 — 2026-03-22 — 2026-03-22 — 2026-03-22 — 2026-03-22 — 2026-03-22 — 2026-03-22 — 2026-03-21 — 2026-03-21 — 2026-03-21 — 2026-03-21 — 2026-03-21 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
          </svg>
          Sign in with Google
        </button>
        <p style="margin-top:32px;font-size:12px;color:var(--text-muted);text-align:center;line-height:1.6;">
          Your data is stored in your<br>own Google Drive — private & secure
        </p>
      </div>
    `;
    document.getElementById('signin-btn').addEventListener('click', () => {
      startOAuthFlow(CLIENT_ID, REDIRECT_URI);
    });
  }

  function showLoading() {
    document.getElementById('screen').innerHTML = `
      <div class="login-screen">
        <div class="spinner"></div>
        <p style="margin-top:16px;color:var(--text-muted);font-size:14px;">Loading your data…</p>
      </div>
    `;
  }

  function showError(msg) {
    document.getElementById('screen').innerHTML = `
      <div class="login-screen">
        <div style="font-size:48px;margin-bottom:16px;">⚠️</div>
        <p style="color:var(--danger);font-weight:600;text-align:center;">${msg}</p>
        <button class="btn btn-primary" style="margin-top:24px;" onclick="window.location.reload()">
          Retry
        </button>
      </div>
    `;
  }

  // ── Sync status listener ──────────────────────────────────────────
  window.addEventListener('sync:status', (e) => {
    const { status, detail } = e.detail;
    const el = document.getElementById('sync-indicator');
    if (!el) return;
    const configs = {
      synced:  { text: '✅ Synced',           bg: 'transparent', show: false },
      syncing: { text: '🔄 Syncing…',          bg: '#EEF2FF',     show: true  },
      pending: { text: `⏳ ${detail}`,         bg: '#FFF7ED',     show: true  },
      failed:  { text: `⚠️ Sync failed — tap to retry`, bg: '#FEE2E2', show: true },
    };
    const cfg = configs[status] || configs.synced;
    el.textContent = cfg.text;
    el.style.background = cfg.bg;
    el.classList.toggle('hidden', !cfg.show);
    if (status === 'failed') {
      el.onclick = () => { processDriveQueue(); el.textContent = '🔄 Retrying…'; };
    } else {
      el.onclick = null;
    }
  });

  function showApp(data) {
    document.getElementById('bottom-nav').classList.remove('hidden');

    // ── Resolve admin/viewer role ────────────────────────────────────
    const userEmail = getUser()?.email || '';
    const role = resolveRole(data, userEmail);
    setCurrentRole(role);

    // ── Sync manager ────────────────────────────────────────────────
    initSyncManager().catch(() => {});
    watchSync();

    initNav();
    navigate('dashboard');

    // ── Security: register session + start heartbeat ───────────────
    registerSession('App A').catch(() => {});
    startHeartbeat();

    // ── Security: check for high-risk events since last visit ───────
    getUnseenHighRiskEvents().then(events => {
      if (events && events.length > 0) {
        showToast(`🔴 ${events.length} security alert${events.length > 1 ? 's' : ''} since last visit — check Settings → Security`, 'error', 8000);
      }
    }).catch(() => {});

    // ── Security: check if this session has been revoked ────────────
    setInterval(() => checkRevocation().then(revoked => {
      if (revoked) {
        showToast('Your session was revoked. Signing out…', 'error', 3000);
        setTimeout(() => { clearAuth(); window.location.reload(); }, 3000);
      }
    }).catch(() => {}), 5 * 60 * 1000); // check every 5 min

    // Run expiry check after UI is ready (non-blocking)
    setTimeout(() => runExpiryCheck().catch(() => {}), 1500);
    // PWA install prompt
    initInstallPrompt('Family Hub', '#3730A3');
    showIOSInstallHint('Family Hub');
    // Watch for connectivity to flush offline queue
    watchConnectivity(({ processed, failed }) => {
      if (processed > 0) showToast(`Synced ${processed} pending change${processed > 1 ? 's' : ''}`, 'success');
      if (failed   > 0) showToast(`${failed} change${failed > 1 ? 's' : ''} failed to sync`, 'error');
    });
  }

  // ── Auth event listener ────────────────────────────────────────────
  window.addEventListener('auth:required', () => {
    document.getElementById('bottom-nav').classList.add('hidden');
    showLogin();
  });

  // ── Mirror sync (triggered by SW) ──────────────────────────────────
  async function performMirrorSync() {
    if (!isOnline() || !isAuthenticated()) return;
    try {
      const { writeMirrorSnapshot } = await import('../shared/drive.js');
      const cached = await getCachedTravelData();
      if (cached) await writeMirrorSnapshot('travel', cached);
    } catch { /* silent */ }
  }

  // ── Offline sync queue processor ───────────────────────────────────
  async function syncFromQueue() {
    // TODO: Phase 3 — process queued writes when coming back online
  }

  // ── Boot ────────────────────────────────────────────────────────────
  boot();
</script>

</body>
</html>
