<!-- v4.0.0 — 2026-05-01 — Local-first: Google OAuth/Drive removed -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="referrer" content="no-referrer" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' cdnjs.cloudflare.com fonts.googleapis.com; connect-src 'self' https://nominatim.openstreetmap.org https://www.openstreetmap.org; font-src 'self' fonts.gstatic.com data:; frame-src https://www.openstreetmap.org; img-src 'self' data: blob: https://*.openstreetmap.org; style-src 'self' 'unsafe-inline' fonts.googleapis.com;" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#3730A3" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Family Hub" />
  <meta name="description" content="Family travel tracker and document expiry manager" />

  <title>Family Hub</title>

  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icons/icon-192.png" type="image/png">
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="css/app.css" />

  <script>
    window.HTML_VERSION = '4.0.0';
    window.BUILD_TIME   = '2026-05-01';
  </script>
</head>
<body>

<div id="app">

  <!-- ── Offline banner ────────────────────────────────────────────── -->
  <div id="offline-banner" class="offline-banner hidden" role="status">
    <span>📡</span>
    <span>No internet — all data is stored locally</span>
  </div>

  <!-- ── Main screen container ─────────────────────────────────────── -->
  <main id="screen" role="main" aria-live="polite">
    <div class="login-screen" id="initial-loader">
      <div class="spinner"></div>
    </div>
  </main>

  <!-- ── Modal overlay ─────────────────────────────────────────────── -->
  <div id="member-modal" class="modal-overlay hidden" style="
    position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:500;
    display:flex;align-items:flex-end;justify-content:center;
  "></div>

  <!-- ── Sync status indicator ─────────────────────────────────────── -->
  <div id="sync-indicator" class="hidden" style="
    position:fixed;top:0;left:0;right:0;z-index:500;
    display:flex;align-items:center;justify-content:center;
    gap:6px;padding:6px 16px;font-size:12px;font-weight:500;
    background:var(--surface);border-bottom:1px solid var(--border);
    transition:all 0.2s;
  "></div>

  <!-- ── Bottom navigation ─────────────────────────────────────────── -->
  <nav class="bottom-nav hidden" id="bottom-nav" role="navigation" aria-label="Main navigation">
    <button class="nav-item active" data-screen="dashboard" aria-label="Dashboard">
      <span class="nav-icon">🏠</span>
      <span>Home</span>
    </button>
    <button class="nav-item" data-screen="travel-log" aria-label="Travel Log">
      <span class="nav-icon">✈️</span>
      <span>Travel</span>
    </button>
    <button class="nav-item" data-screen="documents" aria-label="Documents">
      <span class="nav-icon">🪪</span>
      <span>Docs</span>
    </button>
    <button class="nav-item" data-screen="people" aria-label="People">
      <span class="nav-icon">👥</span>
      <span>People</span>
    </button>
    <button class="nav-item" data-screen="settings" aria-label="Settings">
      <span class="nav-icon">⚙️</span>
      <span>Settings</span>
    </button>
  </nav>

</div><!-- #app -->

<!-- ── App bootstrap ──────────────────────────────────────────────── -->
<script type="module">
  import { openDB, getCachedTravelData } from '../shared/db.js';
  import { navigate, initNav }           from './js/router.js';
  import { isOnline, onNetworkChange, showToast } from '../shared/utils.js';
  import { bootBackup, runBootIntegrityCheck }    from '../shared/sync-manager.js';
  import { runExpiryCheck }              from './js/expiry-checker.js';

  // ── Offline banner ─────────────────────────────────────────────────
  const banner = document.getElementById('offline-banner');
  function updateOfflineBanner(online) {
    banner.classList.toggle('hidden', online);
  }
  updateOfflineBanner(isOnline());
  onNetworkChange(online => updateOfflineBanner(online));

  // ── Sync status listener ──────────────────────────────────────────
  window.addEventListener('sync:status', (e) => {
    const { status, detail } = e.detail;
    const el = document.getElementById('sync-indicator');
    if (!el) return;
    const configs = {
      synced:  { text: '✅ Saved',    bg: 'transparent', show: false },
      syncing: { text: '💾 Saving…',  bg: '#EEF2FF',     show: true  },
      failed:  { text: `⚠️ Save error — ${detail}`, bg: '#FEE2E2', show: true },
    };
    const cfg = configs[status] || configs.synced;
    el.textContent = cfg.text;
    el.style.background = cfg.bg;
    el.classList.toggle('hidden', !cfg.show);
    if (status === 'synced') setTimeout(() => el.classList.add('hidden'), 1500);
  });

  // ── Boot ────────────────────────────────────────────────────────────
  async function boot() {
    try {
      await openDB();

      const cached = await getCachedTravelData();

      if (cached) {
        window._travelData = cached;
        showApp();

        // Non-blocking integrity check
        runBootIntegrityCheck('travel').then(issues => {
          issues.forEach(issue => {
            if (issue.type === 'suspicious_drop') {
              showToast('⚠️ ' + issue.message, 'warning', 6000);
            }
          });
        }).catch(() => {});

        // Non-blocking expiry check
        setTimeout(() => runExpiryCheck().catch(() => {}), 1500);

      } else {
        // No data yet — show welcome/empty state
        showWelcome();
      }

      // Non-blocking boot backup (local integrity check)
      bootBackup('travel').catch(() => {});

    } catch (err) {
      console.error('Boot error:', err);
      showError('Failed to start app. Try refreshing.');
    }
  }

  function showApp() {
    document.getElementById('bottom-nav').classList.remove('hidden');
    initNav();
    const hash = window.location.hash.replace('#', '');
    navigate(hash || 'dashboard');
  }

  function showWelcome() {
    document.getElementById('screen').innerHTML = `
      <div class="login-screen fade-in" style="padding:32px 24px;">
        <div style="font-size:56px;margin-bottom:16px;">✈️</div>
        <h1 class="login-title">Family Hub</h1>
        <p class="login-subtitle" style="margin-bottom:32px;">
          Track your family's travel cycles<br>and document expiry dates
        </p>
        <button class="btn btn-primary" id="start-fresh-btn" style="width:100%;max-width:320px;padding:16px;font-size:16px;margin-bottom:12px;">
          🚀 Start Fresh
        </button>
        <label class="btn btn-secondary" id="import-label" style="width:100%;max-width:320px;padding:16px;font-size:16px;text-align:center;cursor:pointer;display:block;">
          📂 Restore from Backup
          <input type="file" id="import-file" accept=".json,.travelbox" style="display:none;" />
        </label>
        <p style="margin-top:24px;font-size:12px;color:var(--text-muted);text-align:center;line-height:1.6;">
          All data stored locally on this device.<br>No account required.
        </p>
      </div>
    `;
    document.getElementById('start-fresh-btn').addEventListener('click', () => {
      showApp();
    });
    document.getElementById('import-file').addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      try {
        const { restoreFromLocalFile } = await import('../shared/drive.js');
        await restoreFromLocalFile(file, 'travel');
        showToast('✅ Data restored!', 'success');
        setTimeout(() => { window.location.reload(); }, 800);
      } catch (err) {
        showToast('❌ Restore failed: ' + err.message, 'error', 5000);
      }
    });
  }

  function showError(msg) {
    document.getElementById('screen').innerHTML = `
      <div class="login-screen">
        <div style="font-size:48px;margin-bottom:16px;">⚠️</div>
        <p style="color:var(--danger);font-weight:600;text-align:center;padding:0 24px;">${msg}</p>
        <button class="btn btn-primary" style="margin-top:24px;" onclick="window.location.reload()">Retry</button>
      </div>
    `;
  }

  boot();
</script>

</body>
</html>
