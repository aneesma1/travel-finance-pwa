<!-- v4.0.0 — 2026-05-01 — Local-first: Google OAuth/Drive removed; PIN flow intact -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="referrer" content="no-referrer" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' cdnjs.cloudflare.com fonts.googleapis.com; connect-src 'self'; font-src 'self' fonts.gstatic.com data:; img-src 'self' data: blob:; style-src 'self' 'unsafe-inline' fonts.googleapis.com;" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#065F46" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Private Vault" />
  <meta name="description" content="Private income and expense financial vault" />

  <title>Private Vault</title>

  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icons/icon-192.png" type="image/png">
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="css/app.css" />

  <script>
    window.HTML_VERSION = '4.0.0';
    window.BUILD_TIME   = '2026-05-01';
  </script>
</head>
<body>

<div id="app">

  <!-- ── Offline banner ────────────────────────────────────────────── -->
  <div id="offline-banner" class="offline-banner hidden" role="status">
    <span>📡</span>
    <span>No internet — all data is stored locally</span>
  </div>

  <!-- ── Main screen container ─────────────────────────────────────── -->
  <main id="screen" role="main" aria-live="polite">
    <div class="login-screen" id="initial-loader">
      <div class="spinner" style="border-top-color:var(--primary)"></div>
    </div>
  </main>

  <!-- ── Bottom navigation ─────────────────────────────────────────── -->
  <nav class="bottom-nav hidden" id="bottom-nav" role="navigation" aria-label="Main navigation">
    <button class="nav-item active" data-screen="dashboard" aria-label="Dashboard">
      <span class="nav-icon">💰</span>
      <span>Home</span>
    </button>
    <button class="nav-item" data-screen="transactions" aria-label="Transactions">
      <span class="nav-icon">📋</span>
      <span>Records</span>
    </button>
    <button class="nav-item" data-screen="analytics" aria-label="Analytics">
      <span class="nav-icon">📊</span>
      <span>Analytics</span>
    </button>
    <button class="nav-item" data-screen="settings" aria-label="Settings">
      <span class="nav-icon">⚙️</span>
      <span>Settings</span>
    </button>
  </nav>

  <!-- ── Sync status indicator ─────────────────────────────────────── -->
  <div id="sync-indicator" class="hidden" style="
    position:fixed;top:0;left:0;right:0;z-index:500;
    display:flex;align-items:center;justify-content:center;
    gap:6px;padding:6px 16px;font-size:12px;font-weight:500;
    background:var(--surface);border-bottom:1px solid var(--border);
    transition:all 0.2s;
  "></div>

</div><!-- #app -->

<!-- ── App bootstrap ──────────────────────────────────────────────── -->
<script type="module">
  import { openDB, getCachedFinanceData }         from '../shared/db.js';
  import { navigate, initNav }                    from './js/router.js';
  import { isPinSet, verifyPin }                  from './js/pin.js';
  import { isOnline, onNetworkChange, showToast } from '../shared/utils.js';
  import { bootBackup, runBootIntegrityCheck }    from '../shared/sync-manager.js';

  // ── Offline banner ─────────────────────────────────────────────────
  const banner = document.getElementById('offline-banner');
  updateOfflineBanner(isOnline());
  onNetworkChange(online => updateOfflineBanner(online));
  function updateOfflineBanner(online) {
    banner.classList.toggle('hidden', online);
  }

  // ── Sync status listener ──────────────────────────────────────────
  window.addEventListener('sync:status', (e) => {
    const { status, detail } = e.detail;
    const el = document.getElementById('sync-indicator');
    if (!el) return;
    const configs = {
      synced:  { text: '✅ Saved',    bg: 'transparent', show: false },
      syncing: { text: '💾 Saving…',  bg: '#E1F5EE',     show: true  },
      failed:  { text: `⚠️ Save error — ${detail}`, bg: '#FEE2E2', show: true },
    };
    const cfg = configs[status] || configs.synced;
    el.textContent = cfg.text;
    el.style.background = cfg.bg;
    el.classList.toggle('hidden', !cfg.show);
    if (status === 'synced') setTimeout(() => el.classList.add('hidden'), 1500);
  });

  // ── PIN auto-lock ─────────────────────────────────────────────────
  let lockTimer   = null;
  let appUnlocked = false;
  const LOCK_TIMEOUT_KEY = 'vault_lock_timeout_ms';

  function getLockTimeout() {
    const stored = localStorage.getItem(LOCK_TIMEOUT_KEY);
    if (stored === '0') return 0;
    return Number(stored) || (5 * 60 * 1000);
  }

  document.addEventListener('visibilitychange', () => {
    if (document.hidden) {
      const timeout = getLockTimeout();
      if (timeout === 0) return;
      lockTimer = setTimeout(() => { appUnlocked = false; showPinLock(); }, timeout);
    } else {
      clearTimeout(lockTimer);
    }
  });

  // ── Boot sequence ──────────────────────────────────────────────────
  async function boot() {
    try {
      await openDB();

      if (!isPinSet()) {
        showPinSetup();
        return;
      }

      if (!appUnlocked) {
        showPinLock();
        return;
      }

      await loadAndShowApp();

    } catch (err) {
      console.error('Boot error:', err);
      // If PIN is set, show lock screen rather than error
      try {
        if (isPinSet()) { showPinLock(); return; }
      } catch {}
      showError('Failed to start. Try refreshing.');
    }
  }

  async function loadAndShowApp() {
    const cached = await getCachedFinanceData();
    if (cached) {
      showApp();
      // Non-blocking integrity check
      runBootIntegrityCheck('finance').then(issues => {
        issues.forEach(issue => {
          if (issue.type === 'suspicious_drop') {
            showToast('⚠️ ' + issue.message, 'warning', 6000);
          }
        });
      }).catch(() => {});
    } else {
      // No data yet — show welcome
      showWelcome();
    }
    bootBackup('finance').catch(() => {});
  }

  function showApp() {
    document.getElementById('bottom-nav').classList.remove('hidden');
    initNav();
    navigate('dashboard');
  }

  function showWelcome() {
    document.getElementById('screen').innerHTML = `
      <div class="login-screen fade-in" style="padding:32px 24px;">
        <div style="font-size:56px;margin-bottom:16px;">🔐</div>
        <h1 class="login-title">Private Vault</h1>
        <p class="login-subtitle" style="margin-bottom:32px;">
          Your personal finance tracker<br>Private, secure, PIN-protected
        </p>
        <button class="btn btn-primary" id="start-fresh-btn" style="width:100%;max-width:320px;padding:16px;font-size:16px;margin-bottom:12px;">
          🚀 Start Fresh
        </button>
        <label class="btn btn-secondary" style="width:100%;max-width:320px;padding:16px;font-size:16px;text-align:center;cursor:pointer;display:block;">
          📂 Restore from Backup
          <input type="file" id="import-file" accept=".json,.vaultbox" style="display:none;" />
        </label>
        <p style="margin-top:24px;font-size:12px;color:var(--text-muted);text-align:center;line-height:1.6;">
          All data stored locally on this device.<br>No account required.
        </p>
      </div>
    `;
    document.getElementById('start-fresh-btn').addEventListener('click', () => {
      showApp();
    });
    document.getElementById('import-file').addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      e.target.value = '';
      try {
        const { showRestoreDialog } = await import('../shared/restore-dialog.js');
        const strategy = await showRestoreDialog({
          title: 'How should the backup be loaded?',
          source: file.name,
        });
        if (!strategy) return;
        const { restoreFromLocalFile } = await import('../shared/drive.js');
        await restoreFromLocalFile(file, 'finance', strategy);
        showToast('✅ Data restored!', 'success');
        setTimeout(() => { window.location.reload(); }, 800);
      } catch (err) {
        showToast('❌ Restore failed: ' + err.message, 'error', 5000);
      }
    });
  }

  function showPinLock() {
    import('./js/screens/pin-lock.js').then(m => {
      m.renderPinLock(document.getElementById('screen'), {
        onSuccess: async () => {
          appUnlocked = true;
          await loadAndShowApp();
        },
        onForgot: () => showForgotPin()
      });
    });
  }

  function showPinSetup() {
    import('./js/screens/pin-lock.js').then(m => {
      m.renderPinSetup(document.getElementById('screen'), {
        onComplete: async () => {
          appUnlocked = true;
          await loadAndShowApp();
        }
      });
    });
  }

  function showForgotPin() {
    const screen = document.getElementById('screen');
    screen.innerHTML = `
      <div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;background:var(--bg);">
        <div style="font-size:48px;margin-bottom:16px;">🔑</div>
        <div style="font-size:22px;font-weight:700;color:var(--text);margin-bottom:8px;">Forgot PIN?</div>
        <div style="font-size:14px;color:var(--text-secondary);text-align:center;margin-bottom:32px;line-height:1.6;max-width:300px;">
          To reset your PIN you must restore from a backup file.<br>Your data will be preserved.
        </div>
        <div style="width:100%;max-width:340px;display:flex;flex-direction:column;gap:12px;">
          <label class="btn btn-primary" style="padding:16px;font-size:15px;text-align:center;cursor:pointer;">
            📂 Restore Backup &amp; Reset PIN
            <input type="file" id="forgot-import" accept=".json,.vaultbox" style="display:none;" />
          </label>
          <button id="forgot-back-btn" style="background:none;border:none;font-size:14px;color:var(--text-muted);cursor:pointer;padding:8px;">
            ← Back to PIN
          </button>
        </div>
        <div id="forgot-status" style="margin-top:16px;font-size:13px;color:var(--text-secondary);text-align:center;"></div>
      </div>
    `;

    document.getElementById('forgot-back-btn').addEventListener('click', showPinLock);

    document.getElementById('forgot-import').addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      e.target.value = '';
      const status = document.getElementById('forgot-status');
      try {
        const { showRestoreDialog } = await import('../shared/restore-dialog.js');
        const strategy = await showRestoreDialog({
          title: 'How should the backup be loaded?',
          source: file.name,
        });
        if (!strategy) return;
        const { restoreFromLocalFile } = await import('../shared/drive.js');
        await restoreFromLocalFile(file, 'finance', strategy);
        // Clear PIN so setup screen shows
        localStorage.removeItem('vault_pin_hash');
        localStorage.removeItem('vault_pin_salt');
        status.textContent = '✅ Data restored! Set your new PIN.';
        setTimeout(() => showPinSetup(), 800);
      } catch (err) {
        status.textContent = '❌ ' + err.message;
      }
    });
  }

  function showError(msg) {
    document.getElementById('screen').innerHTML = `
      <div class="login-screen">
        <div style="font-size:48px;margin-bottom:16px;">⚠️</div>
        <p style="color:var(--danger);font-weight:600;text-align:center;padding:0 24px;">${msg}</p>
        <button class="btn btn-primary" style="margin-top:24px;" onclick="window.location.reload()">Retry</button>
      </div>
    `;
  }

  boot();
</script>

</body>
</html>
