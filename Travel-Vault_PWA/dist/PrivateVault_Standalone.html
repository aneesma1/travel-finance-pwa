const DB_NAME    = 'TravelFinanceApp';
const DB_VERSION = 2;

const STORES = {
  travel:       'travel_data',
  finance:      'finance_data',
  syncQueue:    'sync_queue',   // Pending writes to push when back online
  appState:     'app_state',    // UI state, filter preferences

let _db = null;

// ── Open / init ───────────────────────────────────────────────────────────────
function openDB() {
  if (_db) return Promise.resolve(_db);

  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);

    req.onupgradeneeded = (e) => {
      const db = e.target.result;
      // Key-value stores -- all use 'key' as keyPath
      Object.values(STORES).forEach(storeName => {
        if (!db.objectStoreNames.contains(storeName)) {
          db.createObjectStore(storeName, { keyPath: 'key' });
        }
      });

    req.onsuccess  = (e) => { _db = e.target.result; resolve(_db); };
    req.onerror    = (e) => reject(e.target.error);
  });
}

// ── Generic get/set ───────────────────────────────────────────────────────────
async function dbGet(storeName, key) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx  = db.transaction(storeName, 'readonly');
    const req = tx.objectStore(storeName).get(key);
    req.onsuccess = () => resolve(req.result?.value ?? null);
    req.onerror   = () => reject(req.error);
  });
}

async function dbSet(storeName, key, value) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx  = db.transaction(storeName, 'readwrite');
    const req = tx.objectStore(storeName).put({ key, value });
    req.onsuccess = () => resolve();
    req.onerror   = () => reject(req.error);
  });
}

async function dbDelete(storeName, key) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx  = db.transaction(storeName, 'readwrite');
    const req = tx.objectStore(storeName).delete(key);
    req.onsuccess = () => resolve();
    req.onerror   = () => reject(req.error);
  });
}

async function dbGetAll(storeName) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx  = db.transaction(storeName, 'readonly');
    const req = tx.objectStore(storeName).getAll();
    req.onsuccess = () => resolve(req.result.map(r => r.value));

// ── Travel data cache ──────────────────────────────────────────────────────────
async function getCachedTravelData() {
  let data = await dbGet(STORES.travel, 'data');
  if (data) {
    let migrated = false;

    // Phase 1 Migration: travelPersons to passengers
    if (data.travelPersons && !data.passengers) {
      data.passengers = data.travelPersons;
      migrated = true;
    } else if (data.travelPersons && data.passengers) {
      // both exist? merge uniquely by id
      const pMap = new Map();
      [...data.passengers, ...data.travelPersons].forEach(p => { if (p.id) pMap.set(p.id, p); });
      data.passengers = Array.from(pMap.values());
      migrated = true;
    }

    if (data.trips && Array.isArray(data.trips)) {
      data.trips.forEach(t => {
        if (t.personId !== undefined) { t.passengerId = t.personId; delete t.personId; migrated = true; }
        if (t.personName !== undefined) { t.passengerName = t.personName; delete t.personName; migrated = true; }
        if (t.dateOutIndia !== undefined) { t.dateLeftOrigin = t.dateOutIndia; delete t.dateOutIndia; migrated = true; }
        if (t.dateInQatar !== undefined) { t.dateArrivedDest = t.dateInQatar; delete t.dateInQatar; migrated = true; }
        if (t.dateOutQatar !== undefined) { t.dateLeftDest = t.dateOutQatar; delete t.dateOutQatar; migrated = true; }
        if (t.dateInIndia !== undefined) { t.dateReturnedOrigin = t.dateInIndia; delete t.dateInIndia; migrated = true; }
        if (t.daysInQatar !== undefined) { t.daysInDest = t.daysInQatar; delete t.daysInQatar; migrated = true; }

        // Give defaults if they didn't exist
        if (!t.originCountry) { t.originCountry = 'India'; migrated = true; }
        if (!t.destinationCountry) { t.destinationCountry = t.destination || 'Qatar'; migrated = true; }

      delete data.travelPersons;
      // Note: we just silently upgrade memory, and let the next localSave persist it to Drive.

      await dbSet(STORES.travel, 'data', data);

  return data;

// ── Sync queue (offline writes) ────────────────────────────────────────────────
async function enqueueSync(appName, operation) {
  // operation: { type: 'write', appName, mergeFnSerialized, timestamp }
  const queue = await dbGet(STORES.syncQueue, 'queue') || [];
  queue.push({
    id:        Date.now(),
    appName,
    operation,
    timestamp: new Date().toISOString()
  });
  return dbSet(STORES.syncQueue, 'queue', queue);
}

async function getSyncQueue() {
  return dbGet(STORES.syncQueue, 'queue') || [];
}

async function clearSyncQueue() {
  return dbDelete(STORES.syncQueue, 'queue');
}

async function removeSyncItem(id) {
  const queue = await getSyncQueue();
  const updated = queue.filter(item => item.id !== id);
  return dbSet(STORES.syncQueue, 'queue', updated);
}

function toISODate(date) {
  if (!date) return '';
  if (date instanceof Date) return date.toISOString().split('T')[0];
  const s = String(date).trim();
  // Handle DD.MM.YYYY, DD/MM/YYYY, DD-MM-YYYY
  const parts = s.split(/[.\-/]/);
  if (parts.length === 3) {
    let day = parts[0], month = parts[1], year = parts[2];
    // If year is the first part (YYYY-MM-DD), reorder
    if (day.length === 4) return `${day}-${month.padStart(2, '0')}-${year.padStart(2, '0')}`;

}

function daysBetween(dateA, dateB) {
  if (!dateA || !dateB) return null;
  const isoA = toISODate(dateA);
  const isoB = toISODate(dateB);
  const a = new Date(isoA + 'T00:00:00');

function expiryStatus(expiryDateStr) {

  const days = daysFromToday(expiryDateStr);

  if (days < 0) return 'expired';
  if (days <= 30) return 'danger';
  if (days <= 90) return 'warning';
  return 'valid';
}

    danger: '#EF4444',
    warning: '#F59E0B',
    valid: '#10B981',
    unknown: '#94A3B8'
  };
  return map[status] || '#94A3B8';
}

function expiryLifePercent(issueDateStr, expiryDateStr) {
  // Returns 0–100 percent of validity remaining
  if (!issueDateStr || !expiryDateStr) return 100;
  const total = daysBetween(issueDateStr, expiryDateStr);
  const remaining = daysFromToday(expiryDateStr);
  if (!total || total === 0) return 0;
  const pct = Math.round((remaining / total) * 100);

// ─── shared/sync-manager.js ──────────────────────────────────────────────────
// Local-first save orchestration
// All data lives in IndexedDB. No cloud sync. No Drive queue.
//
// Exports:
//   localSave(appName, mergeFn)       — merge + write to IndexedDB, broadcast status
//   bootBackup(appName)               — run integrity check on every boot (non-blocking)
//   runBootIntegrityCheck(appName)    — count-sanity check, returns issues[]

// ── Sync status broadcast ─────────────────────────────────────────────────────
function broadcastStatus(status, detail = '') {
  window.dispatchEvent(new CustomEvent('sync:status', { detail: { status, detail } }));
}

// ── Empty data templates ──────────────────────────────────────────────────────
function getEmptyData(appName) {
  if (appName === 'travel') {
    return {
      schemaVersion: 1, members: [], trips: [], documents: [],
      familyDefaults: {}, familyRelations: [], customDocTypes: []
    };
  }
  return { schemaVersion: 1, transactions: [], categories: [], accounts: [] };
}

// ── Local save — write to IndexedDB immediately ───────────────────────────────
async function localSave(appName, mergeFn) {
  broadcastStatus('syncing', 'Saving…');
  try {
    const current = appName === 'travel'
      ? await getCachedTravelData()
      : await getCachedFinanceData();

    const merged = await mergeFn(current || getEmptyData(appName));
    merged.lastModifiedLocal = new Date().toISOString();

    if (appName === 'travel') await setCachedTravelData(merged);
    else                      await setCachedFinanceData(merged);

    broadcastStatus('synced', 'Saved');
    return merged;
  } catch (err) {
    broadcastStatus('failed', err.message);
    throw err;
  }
}

// ── Boot backup — integrity check on every app open ──────────────────────────
async function bootBackup(appName) {
  try {
    const issues = await runBootIntegrityCheck(appName);
    return issues;
  } catch { return []; }
}

// ── Boot integrity check ──────────────────────────────────────────────────────
async function runBootIntegrityCheck(appName) {
  const issues = [];

  const cached = appName === 'travel'
    ? await getCachedTravelData()
    : await getCachedFinanceData();

  if (!cached) return issues;

  // Check: record count dropped suspiciously since last boot
  const lastCount = await getAppState(`lastKnownCount_${appName}`);
  const currentCount = appName === 'travel'
    ? (cached.trips?.length || 0)
    : (cached.transactions?.length || 0);

  if (lastCount && currentCount < lastCount * 0.8 && lastCount > 5) {
    issues.push({
      type:    'suspicious_drop',
      message: `Record count dropped (${lastCount} → ${currentCount}). Check your data.`,
    });
  }

  await setAppState(`lastKnownCount_${appName}`, currentCount);
  return issues;
}

  if (typeof bootBackup !== 'undefined') window['bootBackup'] = bootBackup;

})();

        <button class="sheet-pill" data-fmt="csv">📄 CSV</button>
      </div>

      <div style="font-size:12px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px;">Scope</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px;" id="export-scope-pills">
        <button class="sheet-pill active" data-scope="filtered">Current filters</button>
        <button class="sheet-pill" data-scope="all">All data</button>
      </div>

      <div id="export-status" style="font-size:13px;color:var(--text-muted);min-height:20px;margin-bottom:12px;"></div>

      <div style="display:flex;gap:10px;">
        <button id="export-download" class="btn btn-primary" style="flex:1;">📥 Download</button>
        <button id="export-share" class="btn btn-secondary" style="flex:1;">📤 Share</button>
      </div>
    `;

    const style = document.createElement('style');
    style.textContent = '.sheet-pill{padding:8px 14px;border-radius:20px;border:1.5px solid var(--border);background:transparent;color:var(--text);font-size:13px;cursor:pointer;} .sheet-pill.active{border-color:var(--primary);background:var(--primary-bg);color:var(--primary);font-weight:600;}';
    sheet.appendChild(style);

    const backdrop = document.createElement('div');
    backdrop.id = 'export-backdrop';
    backdrop.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.35);z-index:999;';
    document.body.appendChild(backdrop);
    document.body.appendChild(sheet);

    const close = () => { sheet.remove(); backdrop.remove(); };
    backdrop.addEventListener('click', close);

    let selectedFmt   = 'xlsx';
    let selectedScope = 'filtered';

    sheet.querySelectorAll('#export-format-pills .sheet-pill').forEach(btn => {
      btn.addEventListener('click', () => {
        selectedFmt = btn.dataset.fmt;
        sheet.querySelectorAll('#export-format-pills .sheet-pill').forEach(b => b.classList.toggle('active', b === btn));
      });
    });

    sheet.querySelectorAll('#export-scope-pills .sheet-pill').forEach(btn => {
      btn.addEventListener('click', () => {
        selectedScope = btn.dataset.scope;
        sheet.querySelectorAll('#export-scope-pills .sheet-pill').forEach(b => b.classList.toggle('active', b === btn));
      });
    });

    async function doExport(deliver) {
      const status = document.getElementById('export-status');
      status.textContent = 'Preparing export…';

      const allTxns = (await getCachedFinanceData())?.transactions || [];
      const scopedTxns = selectedScope === 'filtered'
        ? allTxns.filter(t => {
            if (t.currency !== activeCurrency) return false;
            if (activeYear && t.date?.slice(0,4) !== String(activeYear)) return false;
            if (activeMonth && Number(t.date?.slice(5,7)) !== activeMonth) return false;
            if (activeAccount && t.account !== activeAccount) return false;
            
            if (selectedCategories.length > 0) {
              if (filterLogic === 'OR') {
                if (!selectedCategories.includes(t.category1) && !selectedCategories.includes(t.category2)) return false;
              } else {
                const tCats = [t.category1, t.category2].filter(Boolean);
                if (!selectedCategories.every(c => tCats.includes(c))) return false;
              }
            }
            return true;
          })
        : allTxns;

      const scopeLabel = selectedScope === 'filtered' ? filterSummary.replace(/ · /g,'_') : 'All';
      const filename = 'Finance_' + scopeLabel + '_' + ts + '.' + selectedFmt;

      status.textContent = 'Exporting ' + scopedTxns.length + ' records…';

      if (selectedFmt === 'csv') {
        const headers = ['Timestamp','Date','Description','Amount Spend','Income','Category 1','Category 2','Notes 1','Account','Currency'];
        const rows = scopedTxns.map(t => [
          t.timestamp||'', t.date||'', t.description||'',
          t.amountSpend??'', t.income??'', t.category1||'',
          t.category2||'', t.notes1||'', t.account||'', t.currency||''
        ]);
        const csv = [headers, ...rows].map(r => r.map(v => '"' + String(v).replace(/"/g, '""') + '"').join(',')).join('\n');
        const blob = new Blob([csv], { type: 'text/csv' });
        if (deliver === 'download') {
          const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
          a.download = filename; a.click(); URL.revokeObjectURL(a.href);
        } else if (navigator.share) {
          await navigator.share({ files: [new File([blob], filename, { type: 'text/csv' })] }).catch(()=>{});
        }
        status.textContent = '✅ ' + filename;
        return;
      }

      // XLSX export via SheetJS
      if (!window.XLSX) {
        await new Promise((res,rej) => {
          const s = document.createElement('script');
          s.src = 'https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
          s.onload = res; s.onerror = rej;
          document.head.appendChild(s);
        });
      }
      const headers = ['Timestamp','Date','Description','Amount Spend','Income','Category 1','Category 2','Notes 1','Account','Currency'];
      const rows = scopedTxns.map(t => [
        t.timestamp||'', t.date||'', t.description||'',
        t.amountSpend??'', t.income??'', t.category1||'',
        t.category2||'', t.notes1||'', t.account||'', t.currency||''
      ]);
      const wb = XLSX.utils.book_new();
      const ws = XLSX.utils.aoa_to_sheet([headers, ...rows]);
      XLSX.utils.book_append_sheet(wb, ws, 'Transactions');

      if (deliver === 'download') {
        XLSX.writeFile(wb, filename);
      } else if (navigator.share) {
        const wbout = XLSX.write(wb, { bookType:'xlsx', type:'array' });
        const blob = new Blob([wbout], { type:'application/octet-stream' });
        await navigator.share({ files: [new File([blob], filename, { type: blob.type })] }).catch(()=>{});
      }
      status.textContent = '✅ ' + filename;
      setTimeout(close, 1500);
    }

    document.getElementById('export-download').addEventListener('click', () => doExport('download'));
    document.getElementById('export-share').addEventListener('click', () => doExport('share'));
  }

  // Wait for data to be structurally ready (via global event)
  let data = await getCachedFinanceData();
  if (!data) {
    await new Promise(r => window.addEventListener('finance-data-ready', r, { once: true }));
    data = await getCachedFinanceData();
  }
  if (!data) {
    const wrap = document.getElementById('txn-list-wrap');
    wrap.innerHTML = '<div style="display:flex;flex-direction:column;align-items:center;padding:60px 24px;gap:12px;">' +
      '<div style="font-size:48px;">💳</div>' +
      '<div style="font-size:16px;font-weight:600;color:var(--text);">Loading transactions…</div>' +
      '<div style="font-size:13px;color:var(--text-muted);text-align:center;">Syncing from Drive. Tap retry if this persists.</div>' +
      '<button id="retry-load" class="btn btn-primary" style="margin-top:8px;">↻ Retry</button>' +
    '</div>';
    document.getElementById('retry-load')?.addEventListener('click', () => renderTransactions(container));
    return;
  }

  const { transactions = [], categories: savedCats = [], accounts: savedAccounts = [] } = data;
  const allCategories = [...new Set(transactions.map(t => t.category1).filter(Boolean))];
  const allAccounts   = ['Cash','Card','Bank','Other', ...savedAccounts];

  // Read from URL hash or default to All
  const p = getHashParams();
  const activeCurrency = p.currency || 'All';
  const activeYear     = p.year   ? Number(p.year)  : null;  // null = all years
  const activeMonth    = p.month  ? Number(p.month) : 0;
  const activeAccount  = p.account  || '';
  
  let searchText = p.q || '';
  let selectedCategories = JSON.parse(sessionStorage.getItem('vault_search_cats') || '[]');
  if (p.category && !selectedCategories.includes(p.category)) {
    selectedCategories.push(p.category);
    sessionStorage.setItem('vault_search_cats', JSON.stringify(selectedCategories));
  }
  let filterLogic = sessionStorage.getItem('vault_search_logic') || 'OR'; // OR by default
  
  // Suggestions source
  const allDescriptions = [...new Set(transactions.map(t => t.description).filter(Boolean))];

  let _txnPage = 1;
  const TXN_PAGE_SIZE = 30;

  renderSearchBar();
  renderFilterBar();
  renderList();

  function renderSearchBar() {
    const wrap = document.getElementById('search-bar-wrap');
    wrap.innerHTML = `
      <div style="position:relative; display:flex; align-items:center;">
        <input type="text" id="txn-search-input" placeholder="Search categories or description..." 
          style="width:100%; padding:10px 36px 10px 36px; border-radius:var(--radius-md); border:1.5px solid var(--border); background:var(--surface-2); font-size:14px; font-family:inherit;"
          value="${searchText}">
        <span style="position:absolute; left:10px; top:50%; transform:translateY(-50%); font-size:16px; opacity:0.5;">🔍</span>
        <button id="search-clear-btn" style="position:absolute; right:10px; top:50%; transform:translateY(-50%); background:none; border:none; padding:4px; cursor:pointer; display:${searchText ? 'block' : 'none'}; font-size:18px; color:var(--text-muted);">ⓧ</button>
        <div id="search-suggestions" class="hidden" style="
          position:absolute;top:100%;left:0;right:0;z-index:1100;
          background:var(--surface);border:1px solid var(--border);border-radius:0 0 var(--radius-lg) var(--radius-lg);
          box-shadow:0 8px 24px rgba(0,0,0,0.15);max-height:240px;overflow-y:auto;
        "></div>
      </div>
      <div id="filter-chips-wrap" style="display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;"></div>
    `;

    const input = document.getElementById('txn-search-input');
    const suggs = document.getElementById('search-suggestions');
    const clearBtn = document.getElementById('search-clear-btn');

    const updateUIState = () => {
      clearBtn.style.display = searchText ? 'block' : 'none';
      setHashParams({ q: searchText || null });
      renderList();
    };

    input.addEventListener('input', () => {
      searchText = input.value.toLowerCase();
      updateSuggestions();
      updateUIState();
    });

    clearBtn.addEventListener('click', () => {
      searchText = '';
      input.value = '';
      suggs.classList.add('hidden');
      updateUIState();
      input.focus();
    });

    input.addEventListener('focus', () => updateSuggestions());
    
    // Hide suggestions on outside click
    document.addEventListener('click', (e) => {
      if (!wrap.contains(e.target)) suggs.classList.add('hidden');
    });

    renderChips();
  }

  function updateSuggestions() {
    const suggs = document.getElementById('search-suggestions');
    if (!searchText && !document.activeElement.id === 'txn-search-input') {
      suggs.classList.add('hidden');
      return;
    }

    const matches = [];
    // Category matches
    allCategories.forEach(c => {
      if (c.toLowerCase().includes(searchText) && !selectedCategories.includes(c)) {
        matches.push({ type: 'category', text: c });
      }
    });
    // Description matches
    allDescriptions.forEach(d => {
      if (d.toLowerCase().includes(searchText) && searchText.length > 1) {
        matches.push({ type: 'description', text: d });
      }
    });

    if (matches.length === 0) {
      suggs.classList.add('hidden');
      return;
    }

    suggs.classList.remove('hidden');
    suggs.innerHTML = matches.slice(0, 15).map(m => `
      <div class="suggestion-item" data-type="${m.type}" data-text="${m.text}" style="padding:10px 16px;border-bottom:1px solid var(--border-light);cursor:pointer;display:flex;align-items:center;gap:8px;">
        <span>${m.type === 'category' ? '🏷️' : '📝'}</span>
        <div style="flex:1;">
          <div style="font-size:14px;font-weight:600;">${m.text}</div>
          <div style="font-size:11px;color:var(--text-muted);">${m.type}</div>
        </div>
      </div>
    `).join('');

    suggs.querySelectorAll('.suggestion-item').forEach(el => {
      el.addEventListener('click', () => {
        if (el.dataset.type === 'category') {
          selectedCategories.push(el.dataset.text);
          sessionStorage.setItem('vault_search_cats', JSON.stringify(selectedCategories));
          renderChips();
        } else {
          document.getElementById('txn-search-input').value = el.dataset.text;
          searchText = el.dataset.text.toLowerCase();
        }
        suggs.classList.add('hidden');
        renderList();
      });
    });
  }

  function renderChips() {
    const wrap = document.getElementById('filter-chips-wrap');
    if (!wrap) return;

    if (selectedCategories.length === 0) {
      wrap.innerHTML = '';
      return;
    }

    wrap.innerHTML = `
      <div style="display:flex;align-items:center;background:var(--primary-bg);border-radius:16px;padding:2px 4px;margin-right:4px;border:1px solid var(--primary-border);">
        <button id="logic-toggle" style="background:none;border:none;color:var(--primary);font-size:11px;font-weight:700;padding:4px 8px;cursor:pointer;">${filterLogic}</button>
      </div>
      ${selectedCategories.map(c => `
        <div class="filter-chip" style="display:flex;align-items:center;gap:6px;background:var(--surface-3);border:1px solid var(--border);padding:4px 10px;border-radius:16px;font-size:12px;font-weight:600;">
          <span>${c}</span>
          <button class="remove-chip" data-cat="${c}" style="background:none;border:none;padding:0;cursor:pointer;font-size:16px;line-height:1;margin-top:-2px;">×</button>
        </div>
      `).join('')}
    `;

    document.getElementById('logic-toggle')?.addEventListener('click', () => {
      filterLogic = filterLogic === 'OR' ? 'AND' : 'OR';
      sessionStorage.setItem('vault_search_logic', filterLogic);
      renderChips();
      renderList();
    });

    wrap.querySelectorAll('.remove-chip').forEach(btn => {
      btn.addEventListener('click', () => {
        selectedCategories = selectedCategories.filter(c => c !== btn.dataset.cat);
        sessionStorage.setItem('vault_search_cats', JSON.stringify(selectedCategories));
        renderChips();
        renderList();
      });
    });
  }

  function renderFilterBar() {
    const years = [...new Set(transactions.map(t => t.date?.slice(0,4)).filter(y => y && Number(y) >= 2000 && Number(y) <= 2100))].sort((a,b)=>b-a);
    if (!years.includes(String(currentYear()))) years.unshift(String(currentYear()));
    
    // Count active filters (excluding search and multi-cats handled separately)
    const activeCount = [activeAccount, activeMonth !== 0, !!activeYear].filter(Boolean).length;

    // Collapsed summary chips + filter icon
    const summaryParts = [];
    if (activeMonth) summaryParts.push(MONTHS[activeMonth-1]);
    if (activeAccount) summaryParts.push(activeAccount);
    const summaryText = summaryParts.length ? summaryParts.join(' · ') : 'All accounts';

    document.getElementById('filter-bar-wrap').innerHTML = `
      <div style="background:var(--surface);border-bottom:1px solid var(--border);">
        <!-- Currency tabs -->
        <div style="padding:10px 16px 0;">
          <div class="currency-tabs">
            <button class="currency-tab ${activeCurrency === 'All' ? 'active' : ''}" data-currency="All">All</button>
            ${CURRENCIES.map(c => `
              <button class="currency-tab ${activeCurrency === c ? 'active' : ''}" data-currency="${c}">${c}</button>
            `).join('')}
          </div>
        </div>
        <!-- Collapsed filter summary row -->
        <div style="display:flex;align-items:center;gap:8px;padding:10px 16px 10px;" id="filter-summary-row">
          <div style="flex:1;font-size:13px;color:${activeCount > 0 ? 'var(--primary)' : 'var(--text-muted)'};">
            ${activeYear ? activeYear + ' · ' : ''}${summaryText}
          </div>
          ${(activeCount > 0 || searchText || selectedCategories.length > 0)
            ? `<button id="clear-filters-quick" style="display:flex;align-items:center;gap:4px;padding:6px 12px;border-radius:20px;border:1.5px solid var(--danger);background:transparent;color:var(--danger);font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;">✕ Clear all</button>`
            : ''}
          <button id="open-filter-sheet" style="display:flex;align-items:center;gap:4px;padding:6px 12px;border-radius:20px;border:1px solid ${activeCount > 0 ? 'var(--primary)' : 'var(--border)'};background:${activeCount > 0 ? 'var(--primary-bg)' : 'transparent'};color:${activeCount > 0 ? 'var(--primary)' : 'var(--text-secondary)'};font-size:13px;font-weight:500;cursor:pointer;">
            ⚙️ Filters${activeCount > 0 ? ' (' + activeCount + ')' : ''}
          </button>
        </div>
      </div>
    `;

    // Currency tab handlers
    document.querySelectorAll('[data-currency]').forEach(btn =>
      btn.addEventListener('click', () => {
        _txnPage = 1;
        setHashParams({ currency: btn.dataset.currency });
        renderTransactions(container);
      }));

    // Use event delegation so clear button works even when conditionally rendered
    // Event delegation on stable parent - no { once: true } so it persists
    const fbWrap = document.getElementById('filter-bar-wrap');
    if (fbWrap && !fbWrap._clearBound) {
      fbWrap._clearBound = true;
      fbWrap.addEventListener('click', (e) => {
        if (e.target.id === 'clear-filters-quick' || e.target.closest?.('#clear-filters-quick')) {
          _txnPage = 1;
          // Keep currency, clear everything else
          clearHashParams();
          sessionStorage.removeItem('vault_search_cats');
          sessionStorage.removeItem('vault_search_logic');
          selectedCategories = [];
          searchText = '';
          if (activeCurrency !== 'All') setHashParams({ currency: activeCurrency });
          renderTransactions(container);
        }
      });
    }

    // Open filter bottom sheet
    document.getElementById('open-filter-sheet').addEventListener('click', () => {
      openFilterSheet(years, allCategories, allAccounts);
    });
  }

  function openFilterSheet(years, categories, accounts) {
    document.getElementById('filter-sheet')?.remove();
    document.getElementById('filter-backdrop')?.remove();

    const sheet = document.createElement('div');
    sheet.id = 'filter-sheet';
    sheet.style.cssText = 'position:fixed;bottom:0;left:0;right:0;z-index:1000;background:var(--surface);border-radius:20px 20px 0 0;border-top:1px solid var(--border);max-height:70vh;display:flex;flex-direction:column;box-shadow:0 -4px 24px rgba(0,0,0,0.15);';

    // Working copies
    let wYear     = activeYear;
    let wMonth    = activeMonth;
    let wCats     = [...selectedCategories];
    let wAccount  = activeAccount;

    sheet.innerHTML = `
      <div style="padding:12px 20px;border-bottom:1px solid var(--border-light);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;">
        <div style="width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto;position:absolute;left:50%;transform:translateX(-50%);top:8px;"></div>
        <span style="font-size:16px;font-weight:700;">Filters</span>
        <button id="sheet-clear-all" style="font-size:13px;color:var(--danger);background:none;border:none;cursor:pointer;">Clear all</button>
      </div>
      <div style="overflow-y:auto;flex:1;padding:16px 20px 0;">

        <div style="font-size:12px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px;">Year</div>
        <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;" id="sheet-years">
          <button class="sheet-pill ${!wYear?'active':''}" data-year="0">All</button>
          ${years.map(y => `<button class="sheet-pill ${Number(y)===wYear?'active':''}" data-year="${y}">${y}</button>`).join('')}
        </div>

        <div style="font-size:12px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px;">Month</div>
        <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;" id="sheet-months">
          <button class="sheet-pill ${!wMonth?'active':''}" data-month="0">All</button>
          ${MONTHS.map((m,i) => `<button class="sheet-pill ${wMonth===i+1?'active':''}" data-month="${i+1}">${m}</button>`).join('')}
        </div>

        <div style="font-size:12px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px;">Category <span style="font-weight:400;text-transform:none;font-size:11px;">(multi-select)</span></div>
        <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;" id="sheet-cats">
          ${categories.map(c => `<button class="sheet-pill ${wCats.includes(c)?'active':''}" data-cat="${c}">${c}</button>`).join('')}
        </div>

        <div style="font-size:12px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px;">Account</div>
        <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:80px;" id="sheet-accounts">
          <button class="sheet-pill ${!wAccount?'active':''}" data-acc="">All</button>
          ${accounts.map(a => `<button class="sheet-pill ${wAccount===a?'active':''}" data-acc="${a}">${a}</button>`).join('')}
        </div>
      </div>

      <div style="padding:16px 20px;border-top:1px solid var(--border-light);flex-shrink:0;display:flex;gap:10px;background:var(--surface);">
        <button id="sheet-apply" class="btn btn-primary" style="flex:1;">Apply Filters</button>
      </div>
    `;

    // Inject pill styles
    const style = document.createElement('style');
    style.textContent = '.sheet-pill{padding:8px 14px;border-radius:20px;border:1.5px solid var(--border);background:transparent;color:var(--text);font-size:13px;cursor:pointer;} .sheet-pill.active{border-color:var(--primary);background:var(--primary-bg);color:var(--primary);font-weight:600;}';
    sheet.appendChild(style);

    const backdrop = document.createElement('div');
    backdrop.id = 'filter-backdrop';
    backdrop.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.35);z-index:999;';
    document.body.appendChild(backdrop);
    document.body.appendChild(sheet);

    const close = () => { sheet.remove(); backdrop.remove(); };
    backdrop.addEventListener('click', close);

    // Year pills
    sheet.querySelectorAll('[data-year]').forEach(btn => {
      btn.addEventListener('click', () => {
        wYear = Number(btn.dataset.year);
        sheet.querySelectorAll('[data-year]').forEach(b => b.classList.toggle('active', Number(b.dataset.year) === wYear));
      });
    });

      btn.addEventListener('click', () => {
        wMonth = Number(btn.dataset.month);
        sheet.querySelectorAll('[data-month]').forEach(b => b.classList.toggle('active', Number(b.dataset.month) === wMonth));
      });
    });

    sheet.querySelectorAll('[data-cat]').forEach(btn => {
      btn.addEventListener('click', () => {
        const cat = btn.dataset.cat;
        if (wCats.includes(cat)) wCats = wCats.filter(c => c !== cat);
        else wCats.push(cat);
        btn.classList.toggle('active', wCats.includes(cat));
      });
    });

    // Account pills
    sheet.querySelectorAll('[data-acc]').forEach(btn => {
      btn.addEventListener('click', () => {
        wAccount = btn.dataset.acc;
        sheet.querySelectorAll('[data-acc]').forEach(b => b.classList.toggle('active', b.dataset.acc === wAccount));
      });
    });

    document.getElementById('sheet-clear-all').addEventListener('click', () => {
      close();
      _txnPage = 1;
      clearHashParams();
      if (activeCurrency !== 'All') setHashParams({ currency: activeCurrency });
      renderTransactions(container);
    });

    document.getElementById('sheet-apply').addEventListener('click', () => {
      close();
      _txnPage = 1;
      setHashParams({
        year:     wYear !== currentYear() ? wYear : null,
        month:    wMonth || null,
        category: null, // clear from URL to avoid confusion
        account:  wAccount || null,
      });
      sessionStorage.setItem('vault_search_cats', JSON.stringify(wCats));
      selectedCategories = wCats;
      renderTransactions(container);
    });
  }

const MAX_DIM = 800;
const QUALITY = 0.75;

// ── Detect PC (non-touch) ─────────────────────────────────────────────────────
function isPC() {

// ── Compress image file to base64 JPEG ───────────────────────────────────────
async function compressImage(file) {
  return new Promise((resolve, reject) => {
    // Small delay to ensure clipboard stream is ready
    setTimeout(() => {
      const reader = new FileReader();
      reader.onload = (e) => {
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement('canvas');
          let { width, height } = img;
          if (width > MAX_DIM || height > MAX_DIM) {
            if (width > height) { height = Math.round(height * MAX_DIM / width); width = MAX_DIM; }
            else { width = Math.round(width * MAX_DIM / height); height = MAX_DIM; }
          }
          canvas.width = width; canvas.height = height;
          canvas.getContext('2d').drawImage(img, 0, 0, width, height);
          resolve(canvas.toDataURL('image/jpeg', QUALITY));
        };
        img.onerror = () => {
          console.error('[photo-picker] Image load error. Type:', file.type, 'Size:', file.size);
          reject(new Error(`Browser could not decode image (${file.type || 'unknown type'})`));
        };
        img.src = e.target.result;
      };
      reader.onerror = () => reject(new Error('FileReader failed to read blob'));
      reader.readAsDataURL(file);
    }, 50);
  });

          box-shadow:0 8px 24px rgba(0,0,0,0.12);
        "></div>

      this._showSuggestions(val);
      this.onInput(val);

    this.input.addEventListener('input', (e) => {
      this.value = e.target.value;
      onInputDebounced(this.value);
    });

    this.input.addEventListener('focus', () => {
      this.input.style.borderColor = 'var(--primary)';
      if (this.value || this.suggestions.length > 0) {
        this._showSuggestions(this.value);
      }
    });

    this.input.addEventListener('blur', () => {
      this.input.style.borderColor = 'var(--border)';
      setTimeout(() => this._hideSuggestions(), 200);

    // Close on outside click
    document.addEventListener('click', (e) => {
      if (!this.container.contains(e.target)) this._hideSuggestions();

    const filtered = query
      ? this.suggestions.filter(s =>
          s.toLowerCase().includes(query.toLowerCase()) && s !== query
        )
      : this.suggestions;

    const top = filtered.slice(0, this.maxSuggestions);
    if (top.length === 0) { this._hideSuggestions(); return; }

    this.dropdown.innerHTML = top.map((s, i) => `
      <div
        class="smart-suggestion-item"

// ── Merge strategy engine ─────────────────────────────────────────────────────
/**
 * Merge incoming backup data into currentData according to strategy.
 *
 * @param {'merge'|'append'|'wipe'} strategy
 * @param {Object} currentData   — current IndexedDB snapshot
 * @param {Object} incomingData  — parsed backup file data
 * @param {'travel'|'finance'} appName
 * @returns {Object} merged data object ready to save
 */
function applyMergeStrategy(strategy, currentData, incomingData, appName) {
  // Wipe: just load incoming, keep schemaVersion sane
  if (strategy === 'wipe') {
    return {
      ...incomingData,
      schemaVersion: incomingData.schemaVersion || currentData?.schemaVersion || 1,
    };
  }

  // Start from a deep-ish copy of current
  const result = { ...(currentData || {}) };
  // Ensure schemaVersion is preserved (use whichever is higher)
  result.schemaVersion = Math.max(
    Number(result.schemaVersion || 0),
    Number(incomingData.schemaVersion || 0)
  ) || 1;

  if (appName === 'finance') {
    _mergeArrays(result, incomingData, 'transactions', strategy,
      t => `${t.date||''}|${(t.description||'').toLowerCase().trim()}|${t.amountSpend||''}|${t.income||''}`
    );
    _mergeStringArrays(result, incomingData, 'categories', strategy);
    _mergeStringArrays(result, incomingData, 'accounts',   strategy);

  } else if (appName === 'travel') {
    // members — dedup by id
    _mergeArrays(result, incomingData, 'members',    strategy, m => m.id || m.name);
    // passengers — dedup by id
    _mergeArrays(result, incomingData, 'passengers', strategy, p => p.id || (p.name||'').toLowerCase().trim());
    // trips — dedup by passengerName + dateLeftOrigin (handles both field naming conventions)
    _mergeArrays(result, incomingData, 'trips', strategy,
      t => `${(t.passengerName || t.personName || '').toLowerCase().trim()}|${t.dateLeftOrigin || t.dateOut || ''}`
    );
    // documents — dedup by id
    _mergeArrays(result, incomingData, 'documents',  strategy, d => d.id);
  }

  return result;
}

// ── Private helpers ───────────────────────────────────────────────────────────
function _mergeArrays(result, incoming, key, strategy, dedupKeyFn) {
  const existing = result[key] || [];
  const newItems = (incoming[key] || []);
  if (!newItems.length) return;

  if (strategy === 'append') {
    result[key] = [...existing, ...newItems];
  } else {
    // merge — skip dupes
    const existingKeys = new Set(existing.map(dedupKeyFn));
    const toAdd = newItems.filter(item => {
      const k = dedupKeyFn(item);
      return k && !existingKeys.has(k);
    });
    result[key] = [...existing, ...toAdd];
  }
}

function _mergeStringArrays(result, incoming, key, strategy) {
  const existing = result[key] || [];
  const newItems = (incoming[key] || []);
  if (!newItems.length) return;

  if (strategy === 'append') {
    result[key] = [...existing, ...newItems];
  } else {
    const existingSet = new Set(existing.map(s => String(s).toLowerCase().trim()));
    const toAdd = newItems.filter(s => !existingSet.has(String(s).toLowerCase().trim()));
    result[key] = [...existing, ...toAdd];
  }
}

function _esc(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

(function() {

// ─── shared/drive.js ─────────────────────────────────────────────────────────
// Browser file utilities (replaces Google Drive API wrapper)
// All storage is local: IndexedDB (runtime) + browser file download (export)
//
// Exports:
//   downloadLocalBackup(appName, data)                     — download JSON backup to browser Downloads
//   saveFileToExports(appName, filename, text)             — download any text/JSON file
//   saveXLSXToExports(appName, filename, wb)               — download XLSX workbook
//   restoreFromLocalFile(file, appName, strategy?)         — restore IndexedDB from picked file
//     strategy: 'merge' | 'append' | 'wipe' (default 'wipe')
//   timestampSuffix()                                      — "YYYY-MM-DD_HH-MM" string

// ── Timestamp helper ──────────────────────────────────────────────────────────
function timestampSuffix() {
  const now = new Date();
  const pad = n => String(n).padStart(2, '0');
  const hr  = now.getHours();
  const ampm = hr >= 12 ? 'PM' : 'AM';
  const h12  = hr % 12 || 12;
  return `${pad(now.getDate())}-${_monthAbbr(now.getMonth())}-${now.getFullYear()}_${pad(h12)}-${pad(now.getMinutes())}_${ampm}`;
}

function _monthAbbr(m) {
  return ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][m];
}

// ── Download JSON backup ──────────────────────────────────────────────────────
function downloadLocalBackup(appName, data) {
  const ts    = timestampSuffix();
  const label = appName === 'travel' ? 'TravelHub' : 'PersonalVault';
  const ext   = appName === 'travel' ? 'travelbox' : 'vaultbox';
  const filename = `${label}_Backup_${ts}.${ext}`;
  _triggerDownload(JSON.stringify(data, null, 2), filename, 'application/json');
  return filename;
}

// ── Save any text file to browser Downloads ───────────────────────────────────
function saveFileToExports(appName, filename, textContent) {
  _triggerDownload(textContent, filename, 'application/octet-stream');
  return filename;
}

// ── Save XLSX workbook to browser Downloads ────────────────────────────────────
function saveXLSXToExports(appName, filename, workbook) {
  if (!window.XLSX) throw new Error('XLSX library not loaded');
  // XLSX.writeFile triggers browser download directly
  XLSX.writeFile(workbook, filename);
  return filename;
}

// ── Restore from local file (file picker result) ──────────────────────────────
// strategy: 'merge' | 'append' | 'wipe'  (default: 'wipe' for backward compat)
async function restoreFromLocalFile(file, appName, strategy = 'wipe') {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = async (e) => {
      try {
        const incomingData = JSON.parse(e.target.result);
        if (!incomingData.schemaVersion) throw new Error('Invalid backup file — missing schemaVersion');

        let finalData;
        if (strategy === 'wipe') {
          finalData = incomingData;
        } else {
          // Load current data for merge/append
          const currentData = appName === 'travel'
            ? (await getCachedTravelData() || {})
            : (await getCachedFinanceData() || {});
          finalData = applyMergeStrategy(strategy, currentData, incomingData, appName);
        }

        if (appName === 'travel') {
          await setCachedTravelData(finalData);
        } else {
          await setCachedFinanceData(finalData);
        }
        resolve(finalData);
      } catch (err) {
        reject(err);
      }
    };
    reader.onerror = () => reject(new Error('Failed to read file'));
    reader.readAsText(file);
  });
}

// ── Internal: trigger browser download ────────────────────────────────────────
function _triggerDownload(content, filename, mimeType) {
  const blob = (content instanceof Blob)
    ? content
    : new Blob([content], { type: mimeType });
  const url = URL.createObjectURL(blob);
  const a   = document.createElement('a');
  a.href     = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

  if (typeof restoreFromLocalFile !== 'undefined') window['restoreFromLocalFile'] = restoreFromLocalFile;

// ── Bar Chart ────────────────────────────────────────────────────────────────
function drawBarChart(txns, year) {
  const canvas = document.getElementById('bar-chart');
  if (!canvas) return;
  canvas.width = canvas.offsetWidth || 340;

  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);

  // Monthly totals
  const monthly = Array.from({ length: 12 }, (_, i) => {
    const mo = String(i + 1).padStart(2, '0');
    const mo_txns = txns.filter(t => t.date?.startsWith(`${year}-${mo}`));
    return {
      income: mo_txns.reduce((s, t) => s + (Number(t.income) || 0), 0),
      spend:  mo_txns.reduce((s, t) => s + (Number(t.amountSpend) || 0), 0),
    };
  });

  const maxVal = Math.max(...monthly.flatMap(m => [m.income, m.spend]), 1);
  const pad = { l: 8, r: 8, t: 10, b: 28 };
  const chartW = W - pad.l - pad.r;
  const chartH = H - pad.t - pad.b;
  const barGap = 2, groupGap = 4;
  const groupW = chartW / 12;
  const barW   = (groupW - groupGap * 2 - barGap) / 2;

  // Gridlines
  ctx.strokeStyle = getComputedStyle(document.documentElement).getPropertyValue('--border') || '#E2E8F0';
  ctx.lineWidth = 0.5;
  for (let i = 0; i <= 4; i++) {
    const y = pad.t + chartH - (i / 4) * chartH;
    ctx.beginPath(); ctx.moveTo(pad.l, y); ctx.lineTo(W - pad.r, y); ctx.stroke();
  }

  monthly.forEach((m, i) => {
    const x = pad.l + i * groupW + groupGap;

    // Income bar
    const incomeH = (m.income / maxVal) * chartH;
    ctx.fillStyle = '#10B981';
    ctx.beginPath();
    ctx.roundRect(x, pad.t + chartH - incomeH, barW, incomeH, [3, 3, 0, 0]);
    ctx.fill();

    // Spend bar
    const spendH = (m.spend / maxVal) * chartH;
    ctx.fillStyle = '#EF4444';
    ctx.beginPath();
    ctx.roundRect(x + barW + barGap, pad.t + chartH - spendH, barW, spendH, [3, 3, 0, 0]);
    ctx.fill();

    // Month label
    ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--color-text-secondary') || '#64748B';
    ctx.font = '9px DM Sans, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(MONTHS[i].slice(0,1), x + barW, H - 8);
  });
}

// ── Donut Chart ──────────────────────────────────────────────────────────────
function drawDonut(txns, mode, year) {
  const canvas = document.getElementById('donut-chart');
  const legend = document.getElementById('donut-legend');
  if (!canvas || !legend) return;

  const yearTxns = txns.filter(t => t.date?.startsWith(String(year)));
  const catTotals = {};
  yearTxns.forEach(t => {
    const cat = t.category1 || 'Other';
    const amt = mode === 'spend' ? (Number(t.amountSpend) || 0) : (Number(t.income) || 0);
    catTotals[cat] = (catTotals[cat] || 0) + amt;
  });

  const total = Object.values(catTotals).reduce((s, v) => s + v, 0);
  const sorted = Object.entries(catTotals).sort((a, b) => b[1] - a[1]).slice(0, 8);

  if (!total) {
    canvas.getContext('2d').clearRect(0, 0, 150, 150);
    legend.innerHTML = `<div style="font-size:13px;color:var(--text-muted);">No ${mode} data for ${year}</div>`;
    return;
  }

  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, 150, 150);

  let startAngle = -Math.PI / 2;
  sorted.forEach(([cat, val], i) => {
    const slice = (val / total) * 2 * Math.PI;
    ctx.beginPath();
    ctx.moveTo(75, 75);
    ctx.arc(75, 75, 65, startAngle, startAngle + slice);
    ctx.closePath();
    ctx.fillStyle = PALETTE[i % PALETTE.length];
    ctx.fill();
    startAngle += slice;
  });

  // Donut hole
  ctx.beginPath();
  ctx.arc(75, 75, 38, 0, 2 * Math.PI);
  ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--color-background-primary') || '#fff';
  ctx.fill();

  // Centre total
  ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--color-text-primary') || '#0F172A';
  ctx.font = 'bold 12px DM Sans, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(formatAmount(total, ''), 75, 72);
  ctx.font = '9px DM Sans, sans-serif';
  ctx.fillStyle = '#94A3B8';
  ctx.fillText('total', 75, 84);

  // Legend
  legend.innerHTML = sorted.map(([cat, val], i) => `
    <div style="display:flex;align-items:center;gap:7px;">
      <div style="width:10px;height:10px;border-radius:2px;background:${PALETTE[i % PALETTE.length]};flex-shrink:0;"></div>
      <div style="flex:1;font-size:12px;color:var(--text-secondary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${cat}</div>
      <div style="font-size:12px;font-weight:600;color:var(--text);font-family:'DM Mono',monospace;">${Math.round((val/total)*100)}%</div>
    </div>
  `).join('');
}

// ── Year-over-Year ────────────────────────────────────────────────────────────
function drawYoY(txns, years) {
  const canvas = document.getElementById('yoy-chart');
  if (!canvas) return;
  canvas.width = canvas.offsetWidth || 340;

  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);

  const activeYears = years.slice(0, 4).sort();
  const yData = activeYears.map(y => ({
    year: y,
    income: txns.filter(t => t.date?.startsWith(String(y))).reduce((s,t) => s + (Number(t.income)||0), 0),
    spend:  txns.filter(t => t.date?.startsWith(String(y))).reduce((s,t) => s + (Number(t.amountSpend)||0), 0),
  }));

  if (!yData.length) return;

  const maxVal = Math.max(...yData.flatMap(d => [d.income, d.spend]), 1);
  const pad = { l: 8, r: 8, t: 10, b: 28 };
  const chartW = W - pad.l - pad.r;
  const chartH = H - pad.t - pad.b;
  const groupW = chartW / activeYears.length;
  const barW = (groupW - 16) / 2;

  // Gridlines
  ctx.strokeStyle = '#E2E8F0';
  ctx.lineWidth = 0.5;
  for (let i = 0; i <= 4; i++) {
    const y = pad.t + chartH - (i / 4) * chartH;
    ctx.beginPath(); ctx.moveTo(pad.l, y); ctx.lineTo(W - pad.r, y); ctx.stroke();
  }

(function() {
// v3.5.5 — 2026-03-22

// ─── app-b-private-vault/js/pin.js ──────────────────────────────────────────
// PIN management -- SHA-256 with random per-device salt
// Random salt generated at first PIN setup, stored in localStorage
// Attacker cannot crack PIN without physical access to the device


const PIN_HASH_KEY     = 'vault_pin_hash';
const PIN_SALT_KEY     = 'vault_pin_salt';      // ← random, per-device
const ATTEMPTS_KEY     = 'vault_pin_attempts';
const LOCKOUT_KEY      = 'vault_pin_lockout_until';
const MAX_ATTEMPTS     = 5;
const LOCKOUT_SECONDS  = 30;

// ── Generate random salt ──────────────────────────────────────────────────────
function generateSalt() {
  const arr = crypto.getRandomValues(new Uint8Array(32));
  return Array.from(arr).map(b => b.toString(16).padStart(2,'0')).join('');
}

// ── Get or create salt ────────────────────────────────────────────────────────
function getSalt() {
  let salt = localStorage.getItem(PIN_SALT_KEY);
  if (!salt) {
    salt = generateSalt();
    localStorage.setItem(PIN_SALT_KEY, salt);
  }
  return salt;
}

// ── SHA-256 hash with per-device salt ────────────────────────────────────────
async function hashPin(pin) {
  const salt    = getSalt();
  const encoder = new TextEncoder();
  const data    = encoder.encode(salt + ':' + pin);
  const hash    = await crypto.subtle.digest('SHA-256', data);
  return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2,'0')).join('');
}

// ── PIN state ─────────────────────────────────────────────────────────────────
function isPinSet() {
  return !!localStorage.getItem(PIN_HASH_KEY);
}

async function setPin(pin) {
  if (!pin || pin.length !== 4 || !/^\d{4}$/.test(pin)) {
    throw new Error('PIN must be exactly 4 digits');
  }
  // Ensure fresh salt exists before hashing
  getSalt();
  const hashed = await hashPin(pin);
  localStorage.setItem(PIN_HASH_KEY, hashed);
  localStorage.removeItem(ATTEMPTS_KEY);
  localStorage.removeItem(LOCKOUT_KEY);
}

async function verifyPin(pin) {
  // Check lockout
  const lockoutUntil = Number(localStorage.getItem(LOCKOUT_KEY) || 0);
  if (Date.now() < lockoutUntil) {
    const remaining = Math.ceil((lockoutUntil - Date.now()) / 1000);
    throw new Error(`LOCKED:${remaining}`);
  }

  const stored = localStorage.getItem(PIN_HASH_KEY);
  if (!stored) throw new Error('No PIN set');

  const hashed  = await hashPin(pin);
  const correct = hashed === stored;

  if (correct) {
    localStorage.removeItem(ATTEMPTS_KEY);
    localStorage.removeItem(LOCKOUT_KEY);
    return true;
  }

  // Track failed attempts
  const attempts = Number(localStorage.getItem(ATTEMPTS_KEY) || 0) + 1;
  localStorage.setItem(ATTEMPTS_KEY, String(attempts));

  if (attempts >= MAX_ATTEMPTS) {
    const lockUntil = Date.now() + LOCKOUT_SECONDS * 1000;
    localStorage.setItem(LOCKOUT_KEY, String(lockUntil));
    localStorage.removeItem(ATTEMPTS_KEY);
    throw new Error(`LOCKED:${LOCKOUT_SECONDS}`);
  }

  return false;
}

async function changePin(currentPin, newPin) {
  const valid = await verifyPin(currentPin);
  if (!valid) throw new Error('Current PIN is incorrect');
  // Generate a fresh salt on PIN change for extra security
  localStorage.removeItem(PIN_SALT_KEY);
  await setPin(newPin);
}

function clearPin() {
  localStorage.removeItem(PIN_HASH_KEY);
  localStorage.removeItem(PIN_SALT_KEY);
  localStorage.removeItem(ATTEMPTS_KEY);
  localStorage.removeItem(LOCKOUT_KEY);
}

function getLockoutSecondsRemaining() {
  const lockoutUntil = Number(localStorage.getItem(LOCKOUT_KEY) || 0);
  if (Date.now() < lockoutUntil) {
    return Math.ceil((lockoutUntil - Date.now()) / 1000);
  }
  return 0;
}

  // ── XLSX Export ───────────────────────────────────────────────────────────
  async function exportToXlsx(transactions, sendEmail) {
    const statusEl = document.getElementById('export-status');
    if (!transactions.length) { showToast('No records to export', 'warning'); return; }

    statusEl.textContent = 'Generating spreadsheet…';

    // Load SheetJS from CDN
    if (!window.XLSX) {
      await new Promise((res, rej) => {
        const s = document.createElement('script');
        s.src = 'https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
        s.onload = res; s.onerror = rej;
        document.head.appendChild(s);
      });
    }

    const XLSX = window.XLSX;
    const headers = [
      'Timestamp', 'Date', 'Description', 'Amount Spend', 'Income',
      'Category 1', 'Category 2', 'Notes 1', 'Account', 'Currency'
    ];

    const rows = transactions
      .sort((a, b) => new Date(b.date) - new Date(a.date))
      .map(t => [
        t.timestamp    || '',
        t.date         || '',
        t.description  || '',
        t.amountSpend  != null ? Number(t.amountSpend) : '',
        t.income       != null ? Number(t.income)      : '',
        t.category1    || '',
        t.category2    || '',
        t.notes1       || '',
        t.account      || '',
        t.currency     || '',
      ]);

    const wb = XLSX.utils.book_new();
    const ws = XLSX.utils.aoa_to_sheet([headers, ...rows]);

    ws['!cols'] = [
      { wch: 22 }, { wch: 12 }, { wch: 28 }, { wch: 14 }, { wch: 14 },
      { wch: 14 }, { wch: 14 }, { wch: 20 }, { wch: 10 }, { wch: 8 }
    ];

    headers.forEach((_, i) => {
      const cell = ws[XLSX.utils.encode_cell({ r: 0, c: i })];
      if (cell) cell.s = { font: { bold: true }, fill: { fgColor: { rgb: '065F46' } } };
    });

    XLSX.utils.book_append_sheet(wb, ws, 'Transactions');

    const expYr  = document.getElementById('exp-year')?.value || 'All';
    const expMo  = document.getElementById('exp-month')?.value;
    const expCur = document.getElementById('exp-currency')?.value || 'All';
    const moLabel = expMo ? MONTHS[Number(expMo) - 1] : 'All';
    const ts = timestampSuffix();
    const filename = `Finance_Export_${expCur}_${expYr}${moLabel ? '_' + moLabel : ''}_${ts}.xlsx`;

    if (!sendEmail) {
      XLSX.writeFile(wb, filename);
      statusEl.textContent = `✅ Downloaded: ${filename}`;
      showToast('Excel file downloaded!', 'success');
    } else {
      try {
        const wbout = XLSX.write(wb, { bookType: 'xlsx', type: 'base64' });
        const subject = encodeURIComponent(`Finance Export — ${moLabel} ${expYr}`);
        const body = encodeURIComponent(
          `Finance export attached.\n\nPeriod: ${moLabel} ${expYr}\nCurrency: ${expCur}\nRecords: ${transactions.length}\n\nGenerated by Private Vault`
        );
        const blob = new Blob(
          [Uint8Array.from(atob(wbout), c => c.charCodeAt(0))],
          { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' }
        );
        const file = new File([blob], filename, { type: blob.type });

        if (navigator.canShare?.({ files: [file] })) {
          await navigator.share({ files: [file], title: 'Finance Export' });
          statusEl.textContent = '✅ Shared via system share sheet';
        } else {
          window.location.href = `mailto:?subject=${subject}&body=${body}`;
          setTimeout(() => {
            XLSX.writeFile(wb, filename);
            statusEl.innerHTML = `✅ Email app opened. File also downloaded as backup.<br>
              <span style="font-size:11px;color:var(--text-muted);">Attach the downloaded file manually if needed.</span>`;
          }, 500);
        }
      } catch (err) {
        XLSX.writeFile(wb, filename);
        statusEl.textContent = '⚠️ Share failed — file downloaded instead.';
      }
    }
  }
