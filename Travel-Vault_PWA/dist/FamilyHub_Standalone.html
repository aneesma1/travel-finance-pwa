    const relatedMember = members.find(m => m.id === rel.toId);

    const y      = genIdx * (NODE_H + V_GAP) + 20;

function getCurrentLocationFromTrips(passengerName, trips) {
  // Match trips where this passenger is primary or a companion
  const nameLower = String(passengerName || '').toLowerCase().trim();
  const personTrips = trips
    .filter(t => {
      const prim = String(t.passengerName || '').toLowerCase() === nameLower;
      const companions = (Array.isArray(t.travelWith) ? t.travelWith : String(t.travelWith || '').split(/[,;]+/))
        .map(n => String(n || '').trim().toLowerCase());
      return prim || companions.includes(nameLower);
    })
    .sort((a, b) => {
      // Sort by arrival date (latest first)
      const da = new Date(a.dateArrivedDest || 0).getTime();
      const db = new Date(b.dateArrivedDest || 0).getTime();
      return db - da; 
    });

  if (!personTrips.length) return { location: 'Unknown', country: '', days: null };

  const latest = personTrips[0];
  const todayStr = today();
  const destCountry = latest.destinationCountry || 'Qatar';

  // In the One-Way model, you are always in the destination of your latest trip
  const days = daysBetween(latest.dateArrivedDest, todayStr);
  return { 
    location: destCountry, 
    country: destCountry, 
    days: days, 
    tripId: latest.id 
  };
}

function getCurrentLocation(person, trips) {
  // Legacy support — delegates to new function using name
  return getCurrentLocationFromTrips(person.name || '', trips);
}

function getPersonDocs(person, documents) {
  return documents.filter(d => d.personId === person.id);
}

function getNextExpiry(docs) {
  const future = docs
    .map(d => ({ ...d, daysLeft: daysFromToday(d.expiryDate) }))
    .filter(d => d.daysLeft !== null)
    .sort((a, b) => a.daysLeft - b.daysLeft);
  return future[0] || null;
}

function getYearlyDestDays(passengerName, trips, year) {
  const nameLower = String(passengerName || '').toLowerCase().trim();
  return trips
    .filter(t => String(t.passengerName || '').toLowerCase() === nameLower)
    .filter(t => {
      const entryDate = t.dateArrivedDest || t.dateLeftOrigin;
      return entryDate && new Date(entryDate).getFullYear() === year;
    })
    .reduce((sum, t) => sum + (Number(t.daysInDest) || Number(t.daysInQatar) || 0), 0);
}

  function showImageShareSheet(url, filename, file, blob) {
    const sheet = document.createElement('div');
    sheet.style.cssText = 'position:fixed;bottom:0;left:0;right:0;z-index:1000;background:var(--surface);border-radius:20px 20px 0 0;border-top:1px solid var(--border);padding:16px 20px 32px;box-shadow:0 -4px 24px rgba(0,0,0,0.2);';
    const preview = '<img src="' + url + '" style="width:100%;max-height:180px;object-fit:contain;border-radius:8px;border:1px solid var(--border);margin-bottom:16px;" />';
    sheet.innerHTML = '<div style="width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 14px;"></div>' +
      preview +
      '<div style="display:flex;flex-direction:column;gap:10px;">' +
        '<button id="img-share-btn" class="btn btn-primary btn-full" style="font-size:15px;">📤 Share via apps</button>' +
        '<button id="img-save-btn" class="btn btn-secondary btn-full" style="font-size:15px;">💾 Save to device</button>' +
        '<button id="img-copy-btn" class="btn btn-secondary btn-full" style="font-size:15px;">📋 Copy image</button>' +
      '</div>';

    const backdrop = document.createElement('div');
    backdrop.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:999;';
    document.body.appendChild(backdrop);
    document.body.appendChild(sheet);

    const close = () => { sheet.remove(); backdrop.remove(); URL.revokeObjectURL(url); };
    backdrop.addEventListener('click', close);

    // ── Helper: blob → base64 string ─────────────────────────────────────────
    function blobToBase64(b) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onloadend = () => resolve(reader.result.split(',')[1]);
        reader.onerror   = reject;
        reader.readAsDataURL(b);
      });
    }

    // ── Share via apps ────────────────────────────────────────────────────────
    document.getElementById('img-share-btn').addEventListener('click', async () => {
      // Capacitor native: use @capacitor/share with a temp CACHE file
      if (window.Capacitor?.isNativePlatform?.()) {
        try {
          const { Filesystem, Share } = window.Capacitor.Plugins;
          const base64 = await blobToBase64(blob);
          // Write to cache so Share plugin can access it as a native URI
          await Filesystem.writeFile({ path: filename, data: base64, directory: 'CACHE', recursive: true });
          const { uri } = await Filesystem.getUri({ path: filename, directory: 'CACHE' });
          await Share.share({ title: 'Family Travel Status', url: uri, dialogTitle: 'Share dashboard image' });
          close();
          return;
        } catch (err) {
          if (err.message !== 'Share canceled') {
            showToast('Share failed — try Save instead', 'warning');
          }
          return;
        }
      }
      // Browser fallback — Web Share API with file
      if (navigator.canShare?.({ files: [file] })) {
        try { await navigator.share({ files: [file], title: 'Family Travel Status' }); close(); }
        catch { /* cancelled by user */ }
      } else {
        showToast('Sharing not supported on this browser — use Save instead', 'warning');
      }
    });

    // ── Save to device ────────────────────────────────────────────────────────
    document.getElementById('img-save-btn').addEventListener('click', async () => {
      // Capacitor native: save to Documents/FamilyHub/ using Filesystem plugin
      if (window.Capacitor?.isNativePlatform?.()) {
        try {
          const { Filesystem } = window.Capacitor.Plugins;
          const base64 = await blobToBase64(blob);
          await Filesystem.writeFile({
            path:      `FamilyHub/${filename}`,
            data:      base64,
            directory: 'DOCUMENTS',
            recursive: true,
          });
          showToast('✅ Saved to Documents/FamilyHub/ folder', 'success', 4000);
          close();
          return;
        } catch (err) {
          showToast('Save failed: ' + err.message, 'warning');
          return;
        }
      }
      // Browser fallback — standard <a download>
      const a = document.createElement('a');
      a.href = url; a.download = filename; a.click();
      showToast('Image downloading to your Downloads folder', 'success');
      close();
    });

    // ── Copy image ────────────────────────────────────────────────────────────
    document.getElementById('img-copy-btn').addEventListener('click', async () => {
      try {
        const data = new ClipboardItem({ 'image/png': blob });
        await navigator.clipboard.write([data]);
        showToast('Image copied to clipboard!', 'success');
      } catch {
        showToast('Copy not supported — use Save instead', 'warning');
      }
      close();
    });
  }

// ── Merge strategy engine ─────────────────────────────────────────────────────
/**
 * Merge incoming backup data into currentData according to strategy.
 *
 * @param {'merge'|'append'|'wipe'} strategy
 * @param {Object} currentData   — current IndexedDB snapshot
 * @param {Object} incomingData  — parsed backup file data
 * @param {'travel'|'finance'} appName
 * @returns {Object} merged data object ready to save
 */
function applyMergeStrategy(strategy, currentData, incomingData, appName) {
  // Wipe: just load incoming, keep schemaVersion sane
  if (strategy === 'wipe') {
    return {
      ...incomingData,
      schemaVersion: incomingData.schemaVersion || currentData?.schemaVersion || 1,
    };
  }

  // Start from a deep-ish copy of current
  const result = { ...(currentData || {}) };
  // Ensure schemaVersion is preserved (use whichever is higher)
  result.schemaVersion = Math.max(
    Number(result.schemaVersion || 0),
    Number(incomingData.schemaVersion || 0)
  ) || 1;

  if (appName === 'finance') {
    _mergeArrays(result, incomingData, 'transactions', strategy,
      t => `${t.date||''}|${(t.description||'').toLowerCase().trim()}|${t.amountSpend||''}|${t.income||''}`
    );
    _mergeStringArrays(result, incomingData, 'categories', strategy);
    _mergeStringArrays(result, incomingData, 'accounts',   strategy);

  } else if (appName === 'travel') {
    // members — dedup by id
    _mergeArrays(result, incomingData, 'members',    strategy, m => m.id || m.name);
    // passengers — dedup by id
    _mergeArrays(result, incomingData, 'passengers', strategy, p => p.id || (p.name||'').toLowerCase().trim());
    // trips — dedup by passengerName + dateLeftOrigin (handles both field naming conventions)
    _mergeArrays(result, incomingData, 'trips', strategy,
      t => `${(t.passengerName || t.personName || '').toLowerCase().trim()}|${t.dateLeftOrigin || t.dateOut || ''}`
    );
    // documents — dedup by id
    _mergeArrays(result, incomingData, 'documents',  strategy, d => d.id);
  }

  return result;
}

// ── Private helpers ───────────────────────────────────────────────────────────
function _mergeArrays(result, incoming, key, strategy, dedupKeyFn) {
  const existing = result[key] || [];
  const newItems = (incoming[key] || []);
  if (!newItems.length) return;

  if (strategy === 'append') {
    result[key] = [...existing, ...newItems];
  } else {
    // merge — skip dupes
    const existingKeys = new Set(existing.map(dedupKeyFn));
    const toAdd = newItems.filter(item => {
      const k = dedupKeyFn(item);
      return k && !existingKeys.has(k);
    });
    result[key] = [...existing, ...toAdd];
  }
}

function _mergeStringArrays(result, incoming, key, strategy) {
  const existing = result[key] || [];
  const newItems = (incoming[key] || []);
  if (!newItems.length) return;

  if (strategy === 'append') {
    result[key] = [...existing, ...newItems];
  } else {
    const existingSet = new Set(existing.map(s => String(s).toLowerCase().trim()));
    const toAdd = newItems.filter(s => !existingSet.has(String(s).toLowerCase().trim()));
    result[key] = [...existing, ...toAdd];
  }
}

  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function timestampSuffix() {
  const now = new Date();
  const pad = n => String(n).padStart(2, '0');
  const hr  = now.getHours();
  const ampm = hr >= 12 ? 'PM' : 'AM';
  const h12  = hr % 12 || 12;
  return `${pad(now.getDate())}-${_monthAbbr(now.getMonth())}-${now.getFullYear()}_${pad(h12)}-${pad(now.getMinutes())}_${ampm}`;
}

async function restoreFromLocalFile(file, appName, strategy = 'wipe') {
  return new Promise((resolve, reject) => {

    reader.onload = async (e) => {

        const incomingData = JSON.parse(e.target.result);

          throw new Error('Invalid backup file — not a valid JSON object');

      '</div>',

      // ── Format ──
      '<div style="font-size:12px;font-weight:700;color:var(--text-muted);',
        'text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px;">',
        'Export Format',
      '</div>',
      '<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px;" id="tex-formats">',
        '<button class="tex-fmt active" data-fmt="pdf" style="',
          'padding:9px 16px;border-radius:20px;border:1.5px solid var(--primary);',
          'background:var(--primary-bg);color:var(--primary);font-size:13px;',
          'font-weight:600;cursor:pointer;">📄 PDF Report</button>',
        '<button class="tex-fmt" data-fmt="xlsx" style="',
          'padding:9px 16px;border-radius:20px;border:1.5px solid var(--border);',
          'background:transparent;color:var(--text);font-size:13px;cursor:pointer;">📊 Excel</button>',
        '<button class="tex-fmt" data-fmt="csv" style="',
          'padding:9px 16px;border-radius:20px;border:1.5px solid var(--border);',
          'background:transparent;color:var(--text);font-size:13px;cursor:pointer;">📄 CSV</button>',
        '<button class="tex-fmt" data-fmt="whatsapp" style="',
          'padding:9px 16px;border-radius:20px;border:1.5px solid var(--border);',
          'background:transparent;color:var(--text);font-size:13px;cursor:pointer;">💬 WhatsApp</button>',
      '</div>',

      // ── Destination Country ──
      allCountries.length > 1 ? [
        '<div style="font-size:12px;font-weight:700;color:var(--text-muted);',
          'text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px;">',
          'Destination Country',
        '</div>',
        '<div id="tex-countries" style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;">',
          '<button class="tex-country active" data-country="all" style="',
            'padding:7px 14px;border-radius:20px;border:1.5px solid var(--primary);',
            'background:var(--primary-bg);color:var(--primary);font-size:13px;',
            'font-weight:600;cursor:pointer;">🌍 All</button>',
          allCountries.map(c => {
            const flag = c === 'India' ? '🇮🇳' : c === 'Qatar' ? '🇶🇦' : '📍';
            return '<button class="tex-country" data-country="' + c + '" style="' +
              'padding:7px 14px;border-radius:20px;border:1.5px solid var(--border);' +
              'background:transparent;color:var(--text);font-size:13px;cursor:pointer;">' +
              flag + ' ' + c + '</button>';
          }).join(''),
        '</div>',
      ].join('') : '',

      '<div id="tex-status" style="font-size:13px;color:var(--text-muted);min-height:18px;',
        'text-align:center;margin-bottom:8px;"></div>',
    '</div>',

    // ── Actions ──
    '<div style="padding:12px 20px 32px;border-top:1px solid var(--border-light);',
      'flex-shrink:0;display:flex;gap:10px;">',
      '<button id="tex-export" class="btn btn-primary" style="flex:1;font-size:15px;',
        'padding:14px;">Export</button>',
      '<button id="tex-share" class="btn btn-secondary" style="padding:14px 18px;" title="Share (mobile) or Download (PC)">📤</button>',
    '</div>',
  ].join('');

  const backdrop = document.createElement('div');
  backdrop.id = 'travel-export-backdrop';
  backdrop.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:999;';
  document.body.appendChild(backdrop);
  document.body.appendChild(sheet);

  // ── State ─────────────────────────────────────────────────────────────────
  let selPeople  = new Set(['all']);  // 'all' or member IDs
  let selYear    = 'all';
  let selFmt     = 'pdf';
  let selCountry = 'all';

  const close = () => { sheet.remove(); backdrop.remove(); };
  backdrop.addEventListener('click', close);
  document.getElementById('tex-close').addEventListener('click', close);

  // ── People pills (multi-select) ───────────────────────────────────────────
  sheet.querySelectorAll('.tex-pill').forEach(btn => {
    btn.addEventListener('click', () => {
      const val = btn.dataset.person;
      if (val === 'all') {
        selPeople = new Set(['all']);
      } else {
        selPeople.delete('all');
        if (selPeople.has(val)) selPeople.delete(val);
        else selPeople.add(val);
        if (selPeople.size === 0) selPeople = new Set(['all']);
      }
      sheet.querySelectorAll('.tex-pill').forEach(b => {
        const active = selPeople.has(b.dataset.person);
        b.style.border = '1.5px solid ' + (active ? 'var(--primary)' : 'var(--border)');
        b.style.background = active ? 'var(--primary-bg)' : 'transparent';
        b.style.color = active ? 'var(--primary)' : 'var(--text)';
        b.style.fontWeight = active ? '600' : '400';
      });
    });
  });

  // ── Year pills ────────────────────────────────────────────────────────────
  sheet.querySelectorAll('.tex-year').forEach(btn => {
    btn.addEventListener('click', () => {
      selYear = btn.dataset.year;
      // Set date inputs from year
      if (selYear !== 'all') {
        document.getElementById('tex-from').value = selYear + '-01-01';
        document.getElementById('tex-to').value   = selYear + '-12-31';
      } else {
        document.getElementById('tex-from').value = '';
        document.getElementById('tex-to').value   = '';
      }
      sheet.querySelectorAll('.tex-year').forEach(b => {
        const active = b.dataset.year === selYear;
        b.style.border = '1.5px solid ' + (active ? 'var(--primary)' : 'var(--border)');
        b.style.background = active ? 'var(--primary-bg)' : 'transparent';
        b.style.color = active ? 'var(--primary)' : 'var(--text)';
        b.style.fontWeight = active ? '600' : '400';
      });
    });
  });

  // Typing in date inputs clears year selection
  ['tex-from','tex-to'].forEach(id => {
    document.getElementById(id).addEventListener('change', () => {
      selYear = 'custom';
      sheet.querySelectorAll('.tex-year').forEach(b => {
        b.style.border = '1.5px solid var(--border)';
        b.style.background = 'transparent';
        b.style.color = 'var(--text)';
        b.style.fontWeight = '400';
      });
    });
  });

  // ── Format pills ──────────────────────────────────────────────────────────
  sheet.querySelectorAll('.tex-fmt').forEach(btn => {
    btn.addEventListener('click', () => {
      selFmt = btn.dataset.fmt;
      sheet.querySelectorAll('.tex-fmt').forEach(b => {
        const active = b.dataset.fmt === selFmt;
        b.style.border = '1.5px solid ' + (active ? 'var(--primary)' : 'var(--border)');
        b.style.background = active ? 'var(--primary-bg)' : 'transparent';
        b.style.color = active ? 'var(--primary)' : 'var(--text)';
        b.style.fontWeight = active ? '600' : '400';
      });
    });
  });

  // ── Country pills ─────────────────────────────────────────────────────────
  sheet.querySelectorAll('.tex-country').forEach(btn => {
    btn.addEventListener('click', () => {
      selCountry = btn.dataset.country;
      sheet.querySelectorAll('.tex-country').forEach(b => {
        const active = b.dataset.country === selCountry;
        b.style.border = '1.5px solid ' + (active ? 'var(--primary)' : 'var(--border)');
        b.style.background = active ? 'var(--primary-bg)' : 'transparent';
        b.style.color = active ? 'var(--primary)' : 'var(--text)';
        b.style.fontWeight = active ? '600' : '400';
      });
    });
  });

  // ── Build filtered trips ──────────────────────────────────────────────────
  function getFilteredTrips() {
    const fromVal = document.getElementById('tex-from').value;
    const toVal   = document.getElementById('tex-to').value;
    const personMap = Object.fromEntries(persons.map(m => [m.id || m.name, m]));

    return trips
      .filter(t => {
        // People filter — match by personId, personName, or passengerName
        if (!selPeople.has('all')) {
          const matchById        = t.personId     && selPeople.has(t.personId);
          const matchByName      = t.personName   && selPeople.has(t.personName.trim());
          const matchByPassenger = t.passengerName && selPeople.has(t.passengerName.trim());
          if (!matchById && !matchByName && !matchByPassenger) return false;
        }
        // Country filter
        if (selCountry !== 'all') {
          const dest = t.destinationCountry || t.destination || '';
          if (dest !== selCountry) return false;
        }
        // Date range filter — use primary date field with fallbacks
        const tripDate = t.dateLeftOrigin || t.dateOutIndia || t.dateArrivedDest || '';
        if (fromVal && tripDate && tripDate < fromVal) return false;
        if (toVal   && tripDate && tripDate > toVal)   return false;
        return true;
      })
      .sort((a, b) => new Date(a.dateLeftOrigin || a.dateOutIndia) - new Date(b.dateLeftOrigin || b.dateOutIndia))
      .map(t => {
        const name = getTripPersonName(t);
        return {
          ...t,
          _person: personMap[t.personId] || personMap[name] || { name: name || 'Unknown', emoji: '👤' }
        };
      });
  }

  // ── Export actions ────────────────────────────────────────────────────────
  async function doExport(deliver) {
    const status = document.getElementById('tex-status');
    const filtered = getFilteredTrips();

    if (!filtered.length) {
      showToast('No trips match the selected filters', 'warning');
      return;
    }

    status.textContent = 'Preparing ' + filtered.length + ' trips…';

    try {
      if (selFmt === 'pdf')      await exportPDF(filtered, persons, documents, deliver);
      else if (selFmt === 'xlsx') await exportExcel(filtered, deliver);
      else if (selFmt === 'csv')  await exportCSV(filtered, deliver);
      else if (selFmt === 'whatsapp') await exportWhatsApp(filtered, persons);
      status.textContent = '✅ Done!';
      setTimeout(() => { if (selFmt !== 'whatsapp') close(); }, 1200);
    } catch (err) {
      status.textContent = 'Export failed: ' + err.message;
      showToast('Export failed: ' + err.message, 'error');
    }
  }

  document.getElementById('tex-export').addEventListener('click', () => doExport('download'));
  document.getElementById('tex-share').addEventListener('click',  () => doExport('share'));
}

// ── PDF Export ────────────────────────────────────────────────────────────────
async function exportPDF(trips, members, documents, deliver) {
  if (!window.jspdf) {
    await new Promise((res, rej) => {
      const s = document.createElement('script');
      s.src = 'https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
      s.onload = res; s.onerror = () => rej(new Error('Failed to load PDF library'));
      document.head.appendChild(s);
    });
  }

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
  const W = 210, margin = 14, contentW = W - margin * 2;

  // Group trips by person — use stable key (personId, else name)
  const byPerson = {};
  trips.forEach(t => {
    const pid = t.personId || t._person?.name || getTripPersonName(t) || 'unknown';
    if (!byPerson[pid]) byPerson[pid] = { person: t._person, trips: [] };
    byPerson[pid].trips.push(t);
  });

  let pageNum = 0;

  Object.values(byPerson).forEach(({ person, trips: pTrips }) => {
    if (pageNum > 0) doc.addPage('a4', 'portrait');
    pageNum++;

    let y = margin;

    // ── Header band ──────────────────────────────────────────────────────────
    const rgb = hexToRgbPdf(person?.color || '#3730A3');
    doc.setFillColor(rgb.r, rgb.g, rgb.b);
    doc.roundedRect(margin, y, contentW, 22, 3, 3, 'F');

    doc.setTextColor(255, 255, 255);
    doc.setFontSize(16);
    doc.setFont('helvetica', 'bold');
    doc.text((person?.emoji || '') + ' ' + (person?.name || 'Unknown'), margin + 5, y + 9);

    doc.setFontSize(9);
    doc.setFont('helvetica', 'normal');
    doc.text('Travel History Report · Generated ' + new Date().toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric' }), margin + 5, y + 16);
    y += 28;

    // ── Summary stats ─────────────────────────────────────────────────────────
    const totalTrips   = pTrips.length;
    const totalDays    = pTrips.reduce((s, t) => s + getStayDays(t), 0);
    const yearlyTotals = {};
    pTrips.forEach(t => {
      const yr = t.dateOutIndia?.slice(0,4) || 'Unknown';
      yearlyTotals[yr] = (yearlyTotals[yr] || 0) + getStayDays(t);
    });

    doc.setFillColor(248, 250, 252);
    doc.roundedRect(margin, y, contentW, 20, 2, 2, 'F');
    doc.setDrawColor(220, 220, 230);
    doc.roundedRect(margin, y, contentW, 20, 2, 2, 'S');

    doc.setTextColor(30, 30, 30);
    doc.setFontSize(11);
    doc.setFont('helvetica', 'bold');
    doc.text(String(totalTrips), margin + 20, y + 9);
    doc.text(totalDays + 'd', margin + 65, y + 9);
    doc.text(Object.keys(yearlyTotals).length + ' yrs', margin + 120, y + 9);

    doc.setFontSize(8);
    doc.setFont('helvetica', 'normal');
    doc.setTextColor(100, 100, 100);
    doc.text('Total Trips', margin + 20, y + 15);
    doc.text('Dest. Days', margin + 65, y + 15);
    doc.text('Years Travelled', margin + 120, y + 15);
    y += 26;

    // ── Yearly breakdown ──────────────────────────────────────────────────────
    const sortedYears = Object.keys(yearlyTotals).sort((a,b) => b-a);
    if (sortedYears.length > 1) {
      doc.setFontSize(9);
      doc.setFont('helvetica', 'bold');
      doc.setTextColor(30,30,30);
      doc.text('Days per Year:', margin, y + 4);
      let xOff = margin + 30;
      sortedYears.forEach(yr => {
        doc.setFont('helvetica', 'normal');
        const label = yr + ': ' + yearlyTotals[yr] + 'd';
        doc.text(label, xOff, y + 4);
        xOff += 28;
        if (xOff > W - margin - 28) { xOff = margin + 30; y += 6; }
      });
      y += 10;
    }

    // ── Trips table ───────────────────────────────────────────────────────────
    doc.setFontSize(9);
    doc.setFont('helvetica', 'bold');
    doc.setTextColor(255,255,255);
    doc.setFillColor(55, 48, 163);  // indigo header
    doc.rect(margin, y, contentW, 7, 'F');

    const cols = [
      { label: '#',           x: margin + 1,   w: 6  },
      { label: 'Departed India', x: margin + 7,   w: 26 },
      { label: 'Destination',   x: margin + 33,  w: 22 },
      { label: 'Arrived',       x: margin + 55,  w: 22 },
      { label: 'Left',          x: margin + 77,  w: 22 },
      { label: 'Days',          x: margin + 99,  w: 12 },
      { label: 'Flight In',     x: margin + 111, w: 20 },
      { label: 'Reason',        x: margin + 131, w: 51 },
    ];

    cols.forEach(c => doc.text(c.label, c.x, y + 5));
    y += 9;

    pTrips.sort((a,b) => new Date(b.dateOutIndia) - new Date(a.dateOutIndia))
      .forEach((trip, idx) => {
        if (y > 270) { doc.addPage('a4','portrait'); y = margin; }

        const bg = idx % 2 === 0 ? [255,255,255] : [248,249,252];
        doc.setFillColor(bg[0], bg[1], bg[2]);
        doc.rect(margin, y - 1, contentW, 7, 'F');

        doc.setTextColor(30,30,30);
        doc.setFont('helvetica', 'normal');
        doc.setFontSize(8);

        const row = [
          String(idx + 1),
          fmtDate(trip.dateOutIndia),
          trip.destination || 'Qatar',
          fmtDate(trip.dateInQatar),
          trip.dateOutQatar ? fmtDate(trip.dateOutQatar) : 'Still here',
          trip.daysInQatar != null ? String(trip.daysInQatar) : '--',
          (trip.flightInward || '--').slice(0, 10),
          (trip.reason || '--').slice(0, 38),
        ];

        cols.forEach((c, ci) => {
          const txt = String(row[ci] || '').slice(0, Math.floor(c.w / 1.8));
          doc.text(txt, c.x, y + 4);
        });

        // Thin divider
        doc.setDrawColor(230,230,235);
        doc.setLineWidth(0.2);
        doc.line(margin, y + 6, margin + contentW, y + 6);
        y += 7;
      });

    // ── Document expiry summary (Skip if shared docs) ──────────────────────────
    const memberDocs = documents.filter(d => d.personId === (person?.id || person?.name));
    if (memberDocs.length) {
      y += 6;
      if (y > 260) { doc.addPage('a4','portrait'); y = margin; }

      doc.setFontSize(9);
      doc.setFont('helvetica', 'bold');
      doc.setTextColor(55,48,163);
      doc.text('Document Expiry Summary', margin, y);
      y += 5;

      memberDocs.forEach(d => {
        const days = d.expiryDate
          ? Math.floor((new Date(d.expiryDate) - new Date()) / 86400000)
          : null;
        const status = days == null ? '--' :
          days < 0 ? 'EXPIRED' : days < 30 ? 'URGENT' : days < 90 ? 'WARNING' : 'Valid';
        const color = days == null ? [120,120,120] :
          days < 0 ? [220,38,38] : days < 30 ? [220,38,38] : days < 90 ? [180,100,0] : [21,128,61];

        doc.setFont('helvetica', 'normal');
        doc.setTextColor(30,30,30);
        doc.setFontSize(8);
        doc.text((d.docName || 'Doc') + ': ' + (d.docNumber ? d.docNumber.slice(-4).padStart(d.docNumber.length,'*') : '--'), margin + 2, y + 4);
        doc.text('Expires: ' + fmtDate(d.expiryDate), margin + 55, y + 4);

        doc.setTextColor(color[0], color[1], color[2]);
        doc.setFont('helvetica', 'bold');
        doc.text(status + (days != null && days >= 0 ? ' (' + days + 'd)' : ''), margin + 110, y + 4);
        y += 7;
      });
    }

    // ── Page number ───────────────────────────────────────────────────────────
    doc.setFontSize(7);
    doc.setFont('helvetica', 'normal');
    doc.setTextColor(150,150,150);
    doc.text('Travel History · Family Hub PWA · Page ' + pageNum, margin, 292);
  });

  const ts = timestampSuffix();
  const peopleNames = [...new Set(trips.map(t => t._person?.name))].join('-');
  const filename = 'Travel_History_' + peopleNames.replace(/\s+/g,'-').slice(0,30) + '_' + ts + '.pdf';

  if (deliver === 'share' && navigator.canShare && navigator.canShare({ files: [new File([''], filename)] })) {
    const pdfBlob = doc.output('blob');
    await navigator.share({ files: [new File([pdfBlob], filename, { type: 'application/pdf' })] })
      .catch(() => doc.save(filename)); // fallback to download if share fails/cancelled
  } else {
    doc.save(filename); // Always download on PC or unsupported
  }
  showToast('PDF saved: ' + filename, 'success', 4000);
}

// ── Excel Export ──────────────────────────────────────────────────────────────
async function exportExcel(trips, deliver) {
  if (!window.XLSX) {
    await new Promise((res, rej) => {
      const s = document.createElement('script');
      s.src = 'https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
      s.onload = res; s.onerror = () => rej(new Error('Failed to load Excel library'));
      document.head.appendChild(s);
    });
  }

  const headers = [
    'Person', 'Destination', 'Departed India', 'Arrived',
    'Left', 'Returned India', 'Days Stayed',
    'Flight Inward', 'Flight Outward', 'Reason', 'Travelled With'
  ];

  const rows = trips.map(t => [
    t._person?.name || getTripPersonName(t) || 'Unknown',
    t.destination   || 'Qatar',
    t.dateOutIndia  || '',
    t.dateInQatar   || '',
    t.dateOutQatar  || '',
    t.dateInIndia   || '',
    t.daysInQatar   != null ? t.daysInQatar : '',
    t.flightInward  || '',
    t.flightOutward || '',
    t.reason        || '',
    t.travelWithNames || (t.travelWith || []).join(', '),
  ]);

  const wb = window.XLSX.utils.book_new();
  const ws = window.XLSX.utils.aoa_to_sheet([headers, ...rows]);

  // Column widths
  ws['!cols'] = [14,16,16,14,14,12,14,14,24,20].map(w => ({ wch: w }));

  window.XLSX.utils.book_append_sheet(wb, ws, 'Travel History');

  const ts = timestampSuffix();
  const filename = 'Travel_History_' + ts + '.xlsx';

  if (deliver === 'share' && navigator.canShare) {
    const wbout = window.XLSX.write(wb, { bookType:'xlsx', type:'array' });
    const blob = new Blob([wbout], { type:'application/octet-stream' });
    const file = new File([blob], filename, { type: blob.type });
    if (navigator.canShare({ files: [file] })) {
      await navigator.share({ files: [file] }).catch(() => window.XLSX.writeFile(wb, filename));
    } else {
      window.XLSX.writeFile(wb, filename);
    }
  } else {
    window.XLSX.writeFile(wb, filename);
  }
  showToast('Excel saved: ' + filename, 'success', 3000);
}

// ── CSV Export ────────────────────────────────────────────────────────────────
async function exportCSV(trips, deliver) {
  const headers = [
    'Person', 'Destination', 'Departed India', 'Arrived',
    'Left', 'Returned India', 'Days Stayed',
    'Flight Inward', 'Flight Outward', 'Reason', 'Travelled With'
  ];

  const rows = trips.map(t => [
    t._person?.name || getTripPersonName(t) || 'Unknown',
    t.destination   || 'Qatar',
    t.dateOutIndia  || '',
    t.dateInQatar   || '',
    t.dateOutQatar  || '',
    t.dateInIndia   || '',
    t.daysInQatar   != null ? t.daysInQatar : '',
    t.flightInward  || '',
    t.flightOutward || '',
    t.reason        || '',
    (t.travelWith   || []).join('; '),
  ]);

  const csv = [headers, ...rows]
    .map(r => r.map(v => '"' + String(v).replace(/"/g, '""') + '"').join(','))
    .join('\n');

  const ts = timestampSuffix();
  const filename = 'Travel_History_' + ts + '.csv';
  const blob = new Blob([csv], { type: 'text/csv' });

  const shareFile = new File([blob], filename, { type: 'text/csv' });
  if (deliver === 'share' && navigator.canShare && navigator.canShare({ files: [shareFile] })) {
    await navigator.share({ files: [shareFile] }).catch(() => {
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = filename; a.click(); URL.revokeObjectURL(a.href);
    });
  } else {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = filename; a.click(); URL.revokeObjectURL(a.href);
  }
  showToast('CSV saved: ' + filename, 'success', 3000);
}

// ── WhatsApp Text Copy ────────────────────────────────────────────────────────
async function exportWhatsApp(trips, persons) {
  const lines = [];  // collect all output lines

  // Flatten and group by individual name
  const byPersonName = {};
  trips.forEach(t => {
    const rawName = getTripPersonName(t) || t._person?.name || 'Unknown';
    const splitNames = rawName.split(/[&,]+/).map(n => n.trim()).filter(Boolean);
    
    splitNames.forEach(name => {
      if (!byPersonName[name]) byPersonName[name] = { name, trips: [] };
      // Avoid duplicate trips for the same person in the report (deduplicate by date)
      const dKey = `${t.dateOutIndia}|${t.dateInIndia}`;
      if (!byPersonName[name].trips.some(existing => `${existing.dateOutIndia}|${existing.dateInIndia}` === dKey)) {
        byPersonName[name].trips.push(t);
      }
    });
  });

  Object.values(byPersonName).sort((a,b) => a.name.localeCompare(b.name)).forEach(({ name, trips: pTrips }) => {

    const yearly = {};
    pTrips.forEach(t => {

      yearly[yr] = (yearly[yr] || 0) + getStayDays(t);
    });
    const yrLine = Object.keys(yearly).sort((a,b)=>b-a)
      .map(yr => yr + ': ' + yearly[yr] + 'd').join(' · ');

    pTrips.sort((a,b) => {

      const d2 = b.dateOutIndia || '';
      return d2.localeCompare(d1); // simple string sort for descending dates

function fmtDate(d) {
  if (!d) return '--';
  try {
    return new Date(d + 'T00:00:00').toLocaleDateString('en-GB', {
      day: '2-digit', month: 'short', year: 'numeric'
    });
  } catch { return d; }
}

function hexToRgbPdf(hex) {
  hex = hex.replace('#','');
  if (hex.length === 3) hex = hex.split('').map(c => c+c).join('');
  return {
    r: parseInt(hex.slice(0,2),16),
    g: parseInt(hex.slice(2,4),16),
    b: parseInt(hex.slice(4,6),16),
  };
}

  async function deleteTrip(tripId) {
    if (!confirm('Delete this trip record? This cannot be undone.')) return;

  function computeSummaryData() {
    if (!summaryState.selectedPassenger) return null;
    const pNameLower = summaryState.selectedPassenger.toLowerCase();
    
    const pTrips = safeTrips.filter(t => {
      const prim = String(t.passengerName || '').toLowerCase() === pNameLower;
      const travelWithNames = (Array.isArray(t.travelWith) ? t.travelWith : String(t.travelWith || '').split(/[,;]+/))
        .map(n => String(n || '').trim().toLowerCase());
      return prim || travelWithNames.includes(pNameLower);
    });

    // Sort trips chronologically to bridge them correctly
    const pTripsSorted = pTrips.sort((a,b) => {
      const da = a.dateArrivedDest || a.dateLeftOrigin;
      const db = b.dateArrivedDest || b.dateLeftOrigin;
      return new Date(da) - new Date(db);
    });

    const records = [];
    let lifetimeDays = 0;
    const countryCounts = {};
    let longestStay = 0;

    pTripsSorted.forEach((t, idx) => {
      const entryDt = t.dateArrivedDest || t.dateLeftOrigin;
      if (!entryDt) return;
      
      const nextTrip = pTripsSorted[idx + 1];
      const endDt = nextTrip ? (nextTrip.dateArrivedDest || nextTrip.dateLeftOrigin) : today();
      
      const startMs = new Date(entryDt + 'T00:00:00').getTime();
      const finalEndMs = new Date(endDt + 'T00:00:00').getTime();
      
      if (isNaN(startMs) || isNaN(finalEndMs) || finalEndMs < startMs) return;

      const totalStayDays = Math.round((finalEndMs - startMs) / 86400000) + (nextTrip ? 0 : 1);
      if (totalStayDays > longestStay) longestStay = totalStayDays;
      lifetimeDays += totalStayDays;

      // ── Split Stay by Year ──
      let currentStart = new Date(startMs);
      const country = t.destinationCountry || 'Qatar';

      while (currentStart.getTime() < finalEndMs || (!nextTrip && currentStart.getTime() === finalEndMs)) {
        const curYear = currentStart.getFullYear();
        const yearEnd = new Date(`${curYear}-12-31T23:59:59.999`).getTime();
        
        // Find if we end this fragment at year end or final end
        let fragmentEndMs = Math.min(finalEndMs, yearEnd);
        
        // Calculate days in this fragment
        // If it's the very last day of an ongoing trip, we need to ensure the +1 is handled
        let fragmentDays = Math.round((fragmentEndMs - currentStart.getTime()) / 86400000);
        
        // inclusive logic: if we are at the end and it's ongoing, add the +1
        if (!nextTrip && fragmentEndMs === finalEndMs) {
          fragmentDays += 1;
        }

        if (fragmentDays > 0) {
          records.push({
            year: String(curYear),
            country,
            days: fragmentDays,
            dateIn: currentStart.toISOString().split('T')[0],
            dateOut: (fragmentEndMs === finalEndMs && !nextTrip) ? null : new Date(fragmentEndMs).toISOString().split('T')[0],
            reason: t.reason || '',
          });
          
          countryCounts[country] = (countryCounts[country] || 0) + fragmentDays;
        }

        // Move to start of next year
        currentStart = new Date(`${curYear + 1}-01-01T00:00:00`);
        if (currentStart.getTime() > finalEndMs) break;
      }
    });

    let topDest = 'None';
    let topDestDays = 0;
    Object.keys(countryCounts).forEach(c => {
      if (countryCounts[c] > topDestDays) {
        topDestDays = countryCounts[c];
        topDest = c;
      }
    });

    // Build pivot structures that also store individual trip records
    const pivotYear = {};   // { '2025': { 'Qatar': { total: 58, trips: [...] } } }
    const pivotCountry = {}; // { 'Qatar': { '2025': { total: 58, trips: [...] } } }
    records.forEach(r => {
      if (!pivotYear[r.year]) pivotYear[r.year] = {};
      if (!pivotYear[r.year][r.country]) pivotYear[r.year][r.country] = { total: 0, trips: [] };
      pivotYear[r.year][r.country].total += r.days;
      pivotYear[r.year][r.country].trips.push(r);

      if (!pivotCountry[r.country]) pivotCountry[r.country] = {};
      if (!pivotCountry[r.country][r.year]) pivotCountry[r.country][r.year] = { total: 0, trips: [] };
      pivotCountry[r.country][r.year].total += r.days;
      pivotCountry[r.country][r.year].trips.push(r);
    });

    return { totalTrips: pTrips.length, lifetimeDays, topDest, longestStay, pivotYear, pivotCountry };
  }

(function() {

// ─── shared/photo-picker.js ──────────────────────────────────────────────────
// Shared photo capture component
//   Mobile: tap slot → camera / gallery (capture="environment")
//   PC:     two explicit buttons — "Select File" + "Paste Clipboard"
// Compresses to 800px max / JPEG 75%

const MAX_DIM = 800;
const QUALITY = 0.75;

// ── Detect PC (non-touch) ─────────────────────────────────────────────────────
function isPC() {
  return !('ontouchstart' in window) && navigator.maxTouchPoints === 0;
}

// ── Compress image file to base64 JPEG ───────────────────────────────────────
async function compressImage(file) {
  return new Promise((resolve, reject) => {
    // Small delay to ensure clipboard stream is ready
    setTimeout(() => {
      const reader = new FileReader();
      reader.onload = (e) => {
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement('canvas');
          let { width, height } = img;
          if (width > MAX_DIM || height > MAX_DIM) {
            if (width > height) { height = Math.round(height * MAX_DIM / width); width = MAX_DIM; }
            else { width = Math.round(width * MAX_DIM / height); height = MAX_DIM; }
          }
          canvas.width = width; canvas.height = height;
          canvas.getContext('2d').drawImage(img, 0, 0, width, height);
          resolve(canvas.toDataURL('image/jpeg', QUALITY));
        };
        img.onerror = () => {
          console.error('[photo-picker] Image load error. Type:', file.type, 'Size:', file.size);
          reject(new Error(`Browser could not decode image (${file.type || 'unknown type'})`));
        };
        img.src = e.target.result;
      };
      reader.onerror = () => reject(new Error('FileReader failed to read blob'));
      reader.readAsDataURL(file);
    }, 50);
  });
}

// Track whether the paste dialog is currently open
let _pasteDialogOpen = false;

// ── Paste from clipboard (with Review Modal) ─────────────────────────────
async function showPasteDialog(slotIndex, slots, onChange, rerender) {
  // Prevent duplicate dialogs
  if (_pasteDialogOpen) return;
  _pasteDialogOpen = true;

  // Remove any existing overlay
  document.getElementById('paste-overlay')?.remove();

  const overlay = document.createElement('div');
  overlay.id = 'paste-overlay';
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:3000;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px);';

  let pastedImage = null;

  function closeDialog() {
    _pasteDialogOpen = false;
    overlay.remove();
    document.removeEventListener('paste', handlePaste, true); // Must match addEventListener exactly
  }

  function updateContent() {
    if (!pastedImage) {
      modal.innerHTML = `
        <div style="padding:32px 24px;text-align:center;">
          <div style="font-size:48px;margin-bottom:16px;">📋</div>
          <div style="font-size:18px;font-weight:700;margin-bottom:12px;color:var(--text);">Paste from Clipboard</div>

          </div>
          <div style="display:flex;flex-direction:column;gap:12px;">
            <button id="paste-manual-btn" class="btn btn-primary" style="width:100%;padding:12px;">Trigger System Paste</button>
            <button id="paste-cancel-btn" class="btn btn-secondary" style="width:100%;padding:12px;">Cancel</button>
          </div>
        </div>
      `;
    } else {
      modal.innerHTML = `
        <div style="padding:24px;">
          <div style="font-size:16px;font-weight:700;margin-bottom:16px;text-align:center;">Review Pasted Image</div>
          <div style="background:#000;border-radius:12px;overflow:hidden;margin-bottom:20px;aspect-ratio:4/3;display:flex;align-items:center;justify-content:center;">

          </div>

          return;

    const retryBtn = modal.querySelector('#paste-retry-btn');

    if (e.target === overlay) closeDialog();
  };

// Google Calendar API wrapper

// Called from add-document.js and the expiry checker

const BASE = 'https://www.googleapis.com/calendar/v3/calendars/primary/events';

// ── Create a single alert event ───────────────────────────────────────────────
async function createAlertEvent(doc, memberName, daysBeforeExpiry) {
  const alertDate = calcAlertDate(doc.expiryDate, daysBeforeExpiry);
  const body = buildEventBody(doc, memberName, daysBeforeExpiry, alertDate);

  const res = await authFetch(BASE, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  }, CLIENT_ID);

  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.error?.message || `Calendar create failed: ${res.status}`);
  }
  const event = await res.json();
  return event.id;
}

// ── Update an existing alert event ───────────────────────────────────────────
async function updateAlertEvent(eventId, doc, memberName, daysBeforeExpiry) {
  const alertDate = calcAlertDate(doc.expiryDate, daysBeforeExpiry);
  const body = buildEventBody(doc, memberName, daysBeforeExpiry, alertDate);

  const res = await authFetch(`${BASE}/${eventId}`, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  }, CLIENT_ID);

  if (res.status === 404) {
    // Event was deleted externally -- create fresh
    return createAlertEvent(doc, memberName, daysBeforeExpiry);
  }
  if (!res.ok) throw new Error(`Calendar update failed: ${res.status}`);
  const event = await res.json();
  return event.id;
}

// ── Delete one event ──────────────────────────────────────────────────────────
async function deleteAlertEvent(eventId) {
  const res = await authFetch(`${BASE}/${eventId}`, {
    method: 'DELETE'
  }, CLIENT_ID);
  // 404 = already gone, that's fine
  if (!res.ok && res.status !== 404) {
    throw new Error(`Calendar delete failed: ${res.status}`);
  }
}

// ── Sync all alert days for one document ─────────────────────────────────────
// Returns updated calEventIds map: { 90: 'event_id', 60: 'event_id', 30: 'event_id' }
async function syncDocumentAlerts(doc, memberName) {
  if (!doc.calSynced || !doc.expiryDate) return {};

  const newEventIds = { ...(doc.calEventIds || {}) };
  const errors = [];

  for (const days of (doc.alertDays || [])) {
    try {
      const existingId = newEventIds[days];
      if (existingId) {
        newEventIds[days] = await updateAlertEvent(existingId, doc, memberName, days);
      } else {
        newEventIds[days] = await createAlertEvent(doc, memberName, days);
      }
    } catch (err) {
      errors.push(`${days}d alert: ${err.message}`);
    }
  }

  // Delete events for alert days that were toggled OFF
  const allDays = [90, 60, 30];
  for (const days of allDays) {
    if (!doc.alertDays.includes(days) && newEventIds[days]) {
      try {
        await deleteAlertEvent(newEventIds[days]);
        delete newEventIds[days];
      } catch { /* silent */ }
    }
  }

  if (errors.length) {
    console.warn('Some calendar events failed:', errors);
  }

  return newEventIds;
}

// ── Delete all events for a document ─────────────────────────────────────────
async function deleteAllDocumentAlerts(doc) {
  const ids = Object.values(doc.calEventIds || {}).filter(Boolean);
  await Promise.allSettled(ids.map(id => deleteAlertEvent(id)));
}

// ── Check for documents expiring soon and send alerts ────────────────────────
// Called on app load -- creates calendar events for newly expiring docs
async function runExpiryCheck(data) {
  if (!data) return;
  const { members = [], documents = [] } = data;
  const memberMap = Object.fromEntries(members.map(m => [m.id, m]));
  const results = [];

  for (const doc of documents) {
    if (!doc.calSynced || !doc.expiryDate || !doc.alertDays?.length) continue;
    const member = memberMap[doc.personId];
    if (!member) continue;

    // Check if any alert day is TODAY (create immediate notification)
    const today = new Date().toISOString().split('T')[0];
    for (const days of doc.alertDays) {
      const alertDate = calcAlertDate(doc.expiryDate, days);
      if (alertDate === today && !doc.calEventIds?.[days]) {
        try {
          const eventId = await createAlertEvent(doc, member.name, days);
          results.push({ docId: doc.id, days, eventId, action: 'created' });
        } catch { /* non-blocking */ }
      }
    }
  }

  return results;
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function calcAlertDate(expiryDate, daysBeforeExpiry) {
  const expiry = new Date(expiryDate + 'T00:00:00');
  expiry.setDate(expiry.getDate() - daysBeforeExpiry);
  return expiry.toISOString().split('T')[0];

      `Number: ${doc.docNumber || '--'}`,
      `Expiry Date: ${doc.expiryDate}`,
      `Person: ${memberName}`,
      `Alert: ${daysBeforeExpiry} days before expiry`,
      '',
      'Created by Family Hub App'
    ].join('\n'),
    start:       { date: alertDate },
    end:         { date: alertDate },
    colorId:     daysBeforeExpiry <= 30 ? '11' : daysBeforeExpiry <= 60 ? '5' : '2', // red/yellow/green
    reminders: {
      useDefault: false,
      overrides: [
        { method: 'popup', minutes: 480  },  // 8 AM same day
        { method: 'popup', minutes: 1440 },  // Day before
      ]
    }

async function generateContactCardsPDF(members, documents) {
  // Load jsPDF from CDN
  if (!window.jspdf) {
    await new Promise((res, rej) => {
      const s = document.createElement('script');
      s.src = 'https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
      s.onload = res; s.onerror = () => rej(new Error('Failed to load PDF library'));
      document.head.appendChild(s);
    });
  }

  const { jsPDF } = window.jspdf;
  // A5 dimensions: 148mm × 210mm
  const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a5' });
  const W = 148, H = 210;
  const margin = 10;
  const contentW = W - margin * 2;

  members.forEach((member, idx) => {
    if (idx > 0) doc.addPage('a5', 'portrait');
    const memberDocs = documents.filter(d => d.personId === member.id);
    renderMemberPage(doc, member, memberDocs, W, H, margin, contentW);
  });

  // Save

  // Photo circle
  if (member.photo?.startsWith('data:')) {
    try {
      doc.addImage(member.photo, 'JPEG', x + 4, y + 4, 28, 28, undefined, 'FAST');
      // Clip circle approximation with white ring
      doc.setDrawColor(255,255,255);
      doc.setLineWidth(1);
      doc.circle(x + 18, y + 18, 14, 'S');
    } catch { /* photo load failure */ }
  } else {
    // Emoji placeholder
    doc.setFontSize(20);
    doc.text(member.emoji || '👤', x + 11, y + 21);
  }

  // Name + blood group
  doc.setTextColor(30, 30, 30);
  doc.setFontSize(14);
  doc.setFont('helvetica', 'bold');
  doc.text(member.name || '--', x + 36, y + 14);

  if (member.bloodGroup) {
    doc.setFillColor(239, 68, 68);
    doc.roundedRect(x + 36, y + 17, 18, 6, 1, 1, 'F');
    doc.setTextColor(255,255,255);
    doc.setFontSize(7);
    doc.setFont('helvetica', 'bold');
    doc.text(`🩸 ${member.bloodGroup}`, x + 37, y + 21.5);
  }

  if (member.nationality) {
    doc.setTextColor(80, 80, 80);
    doc.setFontSize(8);
    doc.setFont('helvetica', 'normal');
    doc.text(member.nationality, x + 36 + (member.bloodGroup ? 22 : 0), y + 22);
  }

  // Occupation
  if (member.occupation || member.employer) {
    doc.setTextColor(60, 60, 60);
    doc.setFontSize(8);
    doc.setFont('helvetica', 'normal');
    const occLine = [member.occupation, member.employer].filter(Boolean).join(' @ ');
    doc.text(occLine, x + 36, y + 29);
  }

  y += 40;

  // ── PERSONAL INFO SECTION ─────────────────────────────────────────────────
  y = sectionHeader(doc, '👤 Personal Information', x, y, contentW);

  const personalRows = [
    ['Date of Birth', formatDate(member.dateOfBirth)],
    ['Phone', member.phone],
    ['Email', member.email],
    ['Employer', member.employer],
    ['Employer Phone', member.employerPhone],
  ].filter(r => r[1]);

  personalRows.forEach(([label, value]) => {
    y = infoRow(doc, label, value, x, y, contentW);

      y = locationBlock(doc, '🇶🇦 Qatar', member.homeQatar, x, y, contentW);
    }
    if (member.homeIndia?.address) {
      y = locationBlock(doc, '🇮🇳 India', member.homeIndia, x, y, contentW);
    }
  }

  // ── EMERGENCY CONTACTS ────────────────────────────────────────────────────
  const contacts = (member.emergencyContacts || []).sort((a,b) => a.priority - b.priority);
  if (contacts.length) {
    y += 3;
    y = sectionHeader(doc, '🚨 Emergency Contacts', x, y, contentW);

    contacts.slice(0, 4).forEach((contact, i) => {
      const label = `${i + 1}. ${contact.relationship || 'Contact'}`;
      const value = `${contact.name} -- ${contact.phone}${contact.description ? '\n    ' + contact.description : ''}`;
      y = infoRow(doc, label, value, x, y, contentW);
    });
  }

  // ── DOCUMENTS ─────────────────────────────────────────────────────────────
  if (memberDocs.length) {
    y += 3;
    y = sectionHeader(doc, '🪪 Documents', x, y, contentW);

    memberDocs.forEach(d => {
      const daysLeft = daysFromToday(d.expiryDate);
      const status = daysLeft === null ? '--'
        : daysLeft < 0 ? `EXPIRED ${Math.abs(daysLeft)}d ago`
        : `${daysLeft}d remaining`;
      const masked = d.docNumber ? '···' + d.docNumber.slice(-4) : '--';
      y = infoRow(doc, d.docName, `${masked}  |  Expires: ${d.expiryDate}  |  ${status}`, x, y, contentW);
    });
  }

  // ── FOOTER ─────────────────────────────────────────────────────────────────
  doc.setDrawColor(220, 220, 220);
  doc.setLineWidth(0.3);
  doc.line(x, H - 12, x + contentW, H - 12);
  doc.setTextColor(160, 160, 160);
  doc.setFontSize(7);
  doc.setFont('helvetica', 'normal');
  doc.text(`Generated: ${new Date().toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' })}  |  Family Hub App  |  CONFIDENTIAL`, x, H - 7);
}

// ── PDF Helper functions ──────────────────────────────────────────────────────
function sectionHeader(doc, title, x, y, contentW) {
  doc.setFillColor(245, 245, 250);
  doc.rect(x, y, contentW, 7, 'F');
  doc.setTextColor(55, 48, 163);
  doc.setFontSize(8);
  doc.setFont('helvetica', 'bold');
  doc.text(title, x + 2, y + 5);
  return y + 9;
}

function infoRow(doc, label, value, x, y, contentW, wrap = false) {
  const labelW = 36;
  doc.setTextColor(100, 100, 100);
  doc.setFontSize(7.5);
  doc.setFont('helvetica', 'bold');
  doc.text(label, x + 2, y + 4.5);

  doc.setTextColor(30, 30, 30);
  doc.setFont('helvetica', 'normal');

  if (wrap && value && value.length > 55) {
    const lines = doc.splitTextToSize(value, contentW - labelW - 4);
    doc.text(lines, x + labelW, y + 4.5);
    return y + Math.max(7, lines.length * 4.5);
  }

  const displayValue = value && value.length > 65 ? value.slice(0, 62) + '…' : (value || '--');
  doc.text(displayValue, x + labelW, y + 4.5);
  return y + 7;
}

function locationBlock(doc, countryLabel, location, x, y, contentW) {
  doc.setTextColor(60, 60, 60);
  doc.setFontSize(7.5);
  doc.setFont('helvetica', 'bold');
  doc.text(countryLabel, x + 2, y + 4.5);

  doc.setFont('helvetica', 'normal');
  doc.setTextColor(30, 30, 30);

  const addrLines = doc.splitTextToSize(
    [location.label, location.address].filter(Boolean).join(' -- '),
    contentW - 36
  );
  doc.text(addrLines, x + 36, y + 4.5);
  let lineY = y + 4.5 + (addrLines.length - 1) * 4;

  if (location.lat && location.lng) {
    lineY += 4.5;
    doc.setTextColor(100, 100, 100);
    doc.setFontSize(7);
    doc.text(`📍 ${location.lat.toFixed(6)}, ${location.lng.toFixed(6)}${location.plusCode ? '  |  ' + location.plusCode : ''}`, x + 36, lineY);
  }

  if (location.mapsUrl) {
    lineY += 4;
    doc.setTextColor(55, 48, 163);
    doc.setFontSize(7);
    doc.text(location.mapsUrl.slice(0, 70), x + 36, lineY);
  }

  return lineY + 6;
}

function hexToRgb(hex) {
  const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
  return result
    ? { r: parseInt(result[1],16), g: parseInt(result[2],16), b: parseInt(result[3],16) }
    : { r: 238, g: 242, b: 255 };
}

function formatDate(dateStr) {
  if (!dateStr) return null;
  try {
    return new Date(dateStr + 'T00:00:00').toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' });
  } catch { return dateStr; }
}

  function extractCoordsFromUrl(url) {
    let m;
    m = url.match(/@(-?\d+\.\d+),(-?\d+\.\d+)/);           if (m) return { lat: +m[1], lng: +m[2] };
    m = url.match(/[?&]q=(-?\d+\.\d+),(-?\d+\.\d+)/);      if (m) return { lat: +m[1], lng: +m[2] };
    m = url.match(/ll=(-?\d+\.\d+),(-?\d+\.\d+)/);          if (m) return { lat: +m[1], lng: +m[2] };
    m = url.match(/mlat=(-?\d+\.\d+).*mlon=(-?\d+\.\d+)/); if (m) return { lat: +m[1], lng: +m[2] };
    m = url.match(/#map=\d+\/(-?\d+\.\d+)\/(-?\d+\.\d+)/); if (m) return { lat: +m[1], lng: +m[2] };
    // Google Plus Code -- e.g. "7HQG+XR Doha"
    const pcm = url.match(/([23456789CFGHJMPQRVWX]{4,8}\+[23456789CFGHJMPQRVWX]{2,3})/i);
    if (pcm) {
      const decoded = decodePlusCode(pcm[1]);
      if (decoded) return decoded;
    }
    m = url.match(/(-?\d+\.\d+)\s*,\s*(-?\d+\.\d+)/);      if (m) return { lat: +m[1], lng: +m[2] };
    return null;
  }

  function decodePlusCode(code) {
    try {
      const ALPHA = '23456789CFGHJMPQRVWX';
      const clean = code.toUpperCase().replace(/\+/,'');
      if (clean.length < 6) return null;
      let lat = -90, lng = -180, latDeg = 20, lngDeg = 40;
      for (let i = 0; i < Math.min(clean.length, 8); i += 2) {
        const c1 = ALPHA.indexOf(clean[i]);
        const c2 = i+1 < clean.length ? ALPHA.indexOf(clean[i+1]) : 0;
        if (c1 < 0 || c2 < 0) return null;
        latDeg /= 20; lngDeg /= 20;
        lat += c1 * latDeg;
        lng += c2 * lngDeg;
      }
      return { lat: +(lat + latDeg/2).toFixed(6), lng: +(lng + lngDeg/2).toFixed(6) };
    } catch { return null; }
  }


  function generatePlusCode(lat, lng) {
    try {
      // Approximate Open Location Code (first 8 chars)
      const ALPHABET = '23456789CFGHJMPQRVWX';
      const encode = (val, lo, hi, steps) => {
        let code = '';
        val = Math.min(Math.max(val, lo), hi - 1e-10);
        val = (val - lo) / (hi - lo);
        for (let i = 0; i < steps; i++) {
          val *= 20;
          code += ALPHABET[Math.floor(val)];
          val -= Math.floor(val);
        }
        return code;
      };
      const latCode = encode(lat + 90,  0, 180, 4);
      const lngCode = encode(lng + 180, 0, 360, 4);
      const code = latCode[0] + lngCode[0] + latCode[1] + lngCode[1] +
                   latCode[2] + lngCode[2] + latCode[3] + lngCode[3];
      return code.slice(0,4) + '+' + code.slice(4);
    } catch { return ''; }
  }

        const props    = ['name', 'tel'];
        const opts     = { multiple: false };
        const contacts = await navigator.contacts.select(props, opts);
        if (!contacts.length) return;
        const picked = contacts[0];
        openContactModal(null, {
          name:  picked.name?.[0] || '',
          phone: picked.tel?.[0]  || '',
        });

    tab.querySelectorAll('[data-edit-contact]').forEach(btn => {

    document.getElementById('share-emergency-card').addEventListener('click', async () => {

    // QR Code
    document.getElementById('show-qr-code').addEventListener('click', () => {
      toggleQRCode();
    });

    // Copy text
    document.getElementById('copy-emergency-text').addEventListener('click', async () => {
      const text = buildEmergencyText(draft, documents);
      const ok = await copyToClipboard(text);
      if (ok) showToast('Emergency info copied!', 'success');
    });
  }

  function toggleQRCode() {
    const qrDiv = document.getElementById('qr-display');
    if (qrDiv.style.display !== 'none') { qrDiv.style.display = 'none'; return; }

    // Build compact vCard for QR
    const contacts = (draft.emergencyContacts || []).sort((a,b) => a.priority - b.priority);
    const qrData = [
      `BEGIN:VCARD`, `VERSION:3.0`,
      `FN:${draft.name}`,
      draft.phone     ? `TEL:${draft.phone}` : '',
      draft.bloodGroup ? `NOTE:Blood:${draft.bloodGroup}` : '',
      draft.medicalNotes ? `NOTE:Medical:${draft.medicalNotes.slice(0,100)}` : '',
      draft.homeQatar?.address ? `ADR:;;${draft.homeQatar.address};;;QA` : '',
      draft.homeIndia?.address ? `ADR:;;${draft.homeIndia.address};;;IN` : '',
      ...contacts.slice(0,3).map(c => `TEL;TYPE=EMERGENCY,${c.relationship}:${c.phone}`),
      `END:VCARD`
    ].filter(Boolean).join('\n');

    // Load QRCode.js
    const loadQR = window.QRCode
      ? Promise.resolve()
      : new Promise((res, rej) => {
          const s = document.createElement('script');
          s.src = 'https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js';
          s.onload = res; s.onerror = rej;
          document.head.appendChild(s);
        });

    loadQR.then(() => {
      qrDiv.style.display = 'block';
      qrDiv.innerHTML = `
        <div style="padding:16px;background:var(--surface);border-radius:var(--radius-lg);border:1px solid var(--border);">
          <div style="font-size:13px;font-weight:700;margin-bottom:12px;color:var(--text);">

          <div style="font-size:11px;color:var(--text-muted);text-align:center;line-height:1.5;margin-bottom:12px;">
            Scan with any QR reader. Contains name, blood group,<br>emergency contacts, and home address.
          </div>
          <div style="display:flex;gap:8px;justify-content:center;">
            <button class="btn btn-secondary" style="font-size:12px;padding:8px 16px;" id="download-qr">⬇️ Download</button>
            <button class="btn btn-secondary" style="font-size:12px;padding:8px 16px;" id="hide-qr">Hide</button>
          </div>
        </div>
      `;

      new window.QRCode(document.getElementById('qr-canvas'), {
        text: qrData, width: 220, height: 220,
        colorDark: '#0F172A', colorLight: '#ffffff',
        correctLevel: window.QRCode.CorrectLevel.M
      });

      document.getElementById('hide-qr').addEventListener('click', () => {
        qrDiv.style.display = 'none';
      });

      document.getElementById('download-qr').addEventListener('click', () => {
        const canvas = qrDiv.querySelector('canvas');
        if (canvas) {
          const a = document.createElement('a');
          a.href = canvas.toDataURL('image/png');
          a.download = `${draft.name.replace(/\s+/g,'-')}-QR.png`;
          a.click();
          showToast('QR code downloaded', 'success');
        }
      });
    }).catch(() => showToast('Could not load QR generator', 'error'));
  }

  async function saveMember() {
    const nameInput = document.getElementById('member-name');
    if (nameInput && !nameInput.value.trim()) {

      return;
    }

    // Collect all field values from whichever tab is active
    if (activeTab === 'profile') {
      draft.name          = document.getElementById('member-name')?.value.trim()   || draft.name;
      draft.dateOfBirth   = document.getElementById('dob')?.value                  || draft.dateOfBirth;
      draft.nationality   = document.getElementById('nationality')?.value           || draft.nationality;
      draft.bloodGroup    = document.getElementById('blood-group')?.value           || draft.bloodGroup;
      // Phone: combine country code + number
      const _pNum = document.getElementById('phone')?.value.trim();
      const _pCC  = document.getElementById('phone-cc')?.value || '+974';
      if (_pNum) draft.phone = _pCC + ' ' + _pNum;
      const _eNum = document.getElementById('employer-phone')?.value.trim();
      const _eCC  = document.getElementById('employer-phone-cc')?.value || '+974';

      draft.employerPhone = document.getElementById('employer-phone')?.value.trim() || draft.employerPhone;
      draft.medicalNotes  = document.getElementById('medical-notes')?.value.trim()  || draft.medicalNotes;
      draft.personalNotes = document.getElementById('personal-notes')?.value.trim() || draft.personalNotes;
    }

    try {
      const btn = document.getElementById('save-btn');
      btn.textContent = '⏳';
      btn.disabled = true;

      const newData = await localSave('travel', (remote) => {
        const mems = remote.members || [];
        const idx  = mems.findIndex(m => m.id === draft.id);
        if (idx > -1) mems[idx] = draft;
        else mems.push(draft);
        return { ...remote, members: mems };

      await setCachedTravelData(newData);
      hasUnsavedChanges = false;
      showToast('Profile saved!', 'success');
      btn.textContent = '💾 Save';
      btn.disabled = false;

      showToast('Save failed: ' + err.message, 'error');
      document.getElementById('save-btn').textContent = '💾 Save';
      document.getElementById('save-btn').disabled = false;

async function compressPhoto(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        // Max 400×400, JPEG quality 0.7 → ~40–80KB
        const MAX = 400;
        const scale = Math.min(MAX / img.width, MAX / img.height, 1);
        const canvas = document.createElement('canvas');
        canvas.width  = Math.round(img.width  * scale);
        canvas.height = Math.round(img.height * scale);
        canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
        resolve(canvas.toDataURL('image/jpeg', 0.72));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function buildEmergencyText(member, documents) {
  const contacts   = (member.emergencyContacts || []).sort((a,b) => a.priority - b.priority);
  const memberDocs = documents.filter(d => d.personId === member.id);
  const date       = new Date().toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' });

  let text = `🆘 EMERGENCY INFORMATION -- ${member.name}\n`;
  text += `Generated: ${date}\n`;
  text += `─────────────────────────────\n`;
  if (member.bloodGroup) text += `🩸 Blood Group: ${member.bloodGroup}\n`;
  if (member.nationality) text += `🌍 Nationality: ${member.nationality}\n`;
  if (member.phone)       text += `📞 Phone: ${member.phone}\n`;
  if (member.medicalNotes) text += `⚕️ Medical: ${member.medicalNotes}\n`;
  text += `─────────────────────────────\n`;

  if (contacts.length) {
    text += `🚨 Emergency Contacts:\n`;
    contacts.forEach((c, i) => {
      text += `  ${i+1}. ${c.name} (${c.relationship}) -- ${c.phone}\n`;
      if (c.description) text += `     ${c.description}\n`;
    });
    text += `─────────────────────────────\n`;
  }

  if (member.homeQatar?.address) {
    text += `🇶🇦 Qatar Address:\n${member.homeQatar.label ? member.homeQatar.label + '\n' : ''}${member.homeQatar.address}\n`;
    if (member.homeQatar.lat) text += `📍 ${member.homeQatar.lat.toFixed(6)}, ${member.homeQatar.lng.toFixed(6)}\n`;
    if (member.homeQatar.mapsUrl) text += `🗺️ ${member.homeQatar.mapsUrl}\n`;
  }
  if (member.homeIndia?.address) {
    text += `🇮🇳 India Address:\n${member.homeIndia.label ? member.homeIndia.label + '\n' : ''}${member.homeIndia.address}\n`;
    if (member.homeIndia.lat) text += `📍 ${member.homeIndia.lat.toFixed(6)}, ${member.homeIndia.lng.toFixed(6)}\n`;
  }

  if (memberDocs.length) {
    text += `─────────────────────────────\n🪪 Documents:\n`;
    memberDocs.forEach(d => {
      const dl = daysFromToday(d.expiryDate);
      text += `  ${d.docName}: ${d.expiryDate} (${dl < 0 ? 'EXPIRED' : dl + 'd left'})\n`;
    });
  }

  return text;

    const shown = new Set();

      const pairKey = [r.fromId, r.toId].sort().join('|');
      if (shown.has(pairKey)) return '';
      shown.add(pairKey);
      const from = members.find(m => m.id === r.fromId);
      const to   = members.find(m => m.id === r.toId);
      if (!from || !to) return '';
      const reverseR = draftRelations.find(x => x.fromId === r.toId && x.toId === r.fromId);
      return `
        <div style="display:flex;align-items:center;gap:10px;padding:10px 12px;

  async function addRelationAsEmergencyContact(memberId, contactMember, relationship) {
    const currentData = await getCachedTravelData();
    const newData = await localSave('travel', remote => {
      const mems = remote.members || [];
      const idx  = mems.findIndex(m => m.id === memberId);
      if (idx === -1) return remote;
      const member   = { ...mems[idx] };
      const contacts = [...(member.personalEmergencyContacts || [])];
      const already  = contacts.find(c => c.memberId === contactMember.id);
      if (!already) {
        contacts.push({
          id: uuidv4(), name: contactMember.name, phone: contactMember.phone || '',
          relationship, description: `${relationship} -- linked profile`,
          priority: contacts.length + 1, fromRelation: true, memberId: contactMember.id
        });
        member.personalEmergencyContacts = contacts;
        mems[idx] = member;
      }
      return { ...remote, members: mems };
    });
    await setCachedTravelData(newData);
  }

// ── Shared helpers ────────────────────────────────────────────────────────────
function extractCoords(url) {
  let m;
  // Google Maps / OSM coordinate patterns
  m = url.match(/@(-?\d+\.\d+),(-?\d+\.\d+)/);             if (m) return { lat: +m[1], lng: +m[2] };
  m = url.match(/[?&]q=(-?\d+\.\d+),(-?\d+\.\d+)/);        if (m) return { lat: +m[1], lng: +m[2] };
  m = url.match(/ll=(-?\d+\.\d+),(-?\d+\.\d+)/);            if (m) return { lat: +m[1], lng: +m[2] };
  m = url.match(/mlat=(-?\d+\.\d+).*mlon=(-?\d+\.\d+)/);   if (m) return { lat: +m[1], lng: +m[2] };
  m = url.match(/#map=\d+\/(-?\d+\.\d+)\/(-?\d+\.\d+)/);   if (m) return { lat: +m[1], lng: +m[2] };
  // Google Plus Code -- e.g. "7HQG+XR Doha" or "7HQG+XR"
  const plusCodeMatch = url.match(/([23456789CFGHJMPQRVWX]{4,8}\+[23456789CFGHJMPQRVWX]{2,3})(?:\s+(.+))?/i);
  if (plusCodeMatch) {
    const decoded = decodePlusCode(plusCodeMatch[1]);
    if (decoded) return decoded;
  }
  // Raw coordinates
  m = url.match(/(-?\d+\.\d+)\s*,\s*(-?\d+\.\d+)/);        if (m) return { lat: +m[1], lng: +m[2] };
  return null;
}

// ── Decode a Google Plus Code to approximate lat/lng ─────────────────────────
function decodePlusCode(code) {
  try {
    const ALPHA = '23456789CFGHJMPQRVWX';
    const clean = code.toUpperCase().replace(/\+/,'');
    if (clean.length < 6) return null;
    let lat = -90, lng = -180, latDeg = 20, lngDeg = 40;
    for (let i = 0; i < Math.min(clean.length, 8); i += 2) {
      const c1 = ALPHA.indexOf(clean[i]);
      const c2 = i+1 < clean.length ? ALPHA.indexOf(clean[i+1]) : 0;
      if (c1 < 0 || c2 < 0) return null;
      latDeg /= 20; lngDeg /= 20;
      lat += c1 * latDeg;
      lng += c2 * lngDeg;
    }
    return { lat: +(lat + latDeg/2).toFixed(6), lng: +(lng + lngDeg/2).toFixed(6) };
  } catch { return null; }
}

function generatePlusCode(lat, lng) {

function levenshtein(a, b) {
  a = a.toLowerCase().trim();
  b = b.toLowerCase().trim();
  const m = a.length, n = b.length;
  const dp = Array.from({ length: m + 1 }, (_, i) =>
    Array.from({ length: n + 1 }, (_, j) => i === 0 ? j : j === 0 ? i : 0)
  );
  for (let i = 1; i <= m; i++)
    for (let j = 1; j <= n; j++)
      dp[i][j] = a[i-1] === b[j-1] ? dp[i-1][j-1]
        : 1 + Math.min(dp[i-1][j], dp[i][j-1], dp[i-1][j-1]);
  return dp[m][n];
}

      if (dist <= 2) pairs.push({ a: members[i], b: members[j], dist });

  }
  return pairs;
}

function buildDupeWarning(members) {
  const dupes = [];
  for (let i = 0; i < members.length; i++) {
    for (let j = i + 1; j < members.length; j++) {
      const a = members[i].name.toLowerCase().trim();
      const b = members[j].name.toLowerCase().trim();
      const dp = Array.from({ length: a.length + 1 }, (_, r) =>
        Array.from({ length: b.length + 1 }, (_, c) => r === 0 ? c : c === 0 ? r : 0));
      for (let r = 1; r <= a.length; r++)
        for (let c = 1; c <= b.length; c++)
          dp[r][c] = a[r-1] === b[c-1] ? dp[r-1][c-1] : 1 + Math.min(dp[r-1][c], dp[r][c-1], dp[r-1][c-1]);
      if (dp[a.length][b.length] <= 2)
        dupes.push('"' + members[i].name + '" and "' + members[j].name + '"');
    }
  }
  if (!dupes.length) return '';
  return '<div style="margin:12px 16px 0;background:#FEF3C7;border:1px solid #F59E0B;border-radius:10px;padding:10px 14px;">' +
    '<div style="font-size:13px;font-weight:700;color:#92400E;margin-bottom:4px;">⚠️ Possible duplicate names</div>' +
    dupes.map(d => '<div style="font-size:12px;color:#78350F;">' + d + ' — use Rename &amp; Merge to fix</div>').join('') +
    '</div>';
}
